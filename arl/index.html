<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ARL Token</title>
<style>
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Rg.ttf") format("truetype"); font-weight: 400; font-display: swap; }
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Bd.ttf") format("truetype"); font-weight: 700; font-display: swap; }
  :root {
    --fg: #e9eef6; --muted: rgba(233,238,246,0.55);
    --panel: rgba(138,160,200,0.06); --panel2: rgba(138,160,200,0.10);
    --border: rgba(138,160,200,0.18); --accent: #aebfdb; --good: #41c98a; --err: #e06b6b;
    --gold: #e3c27a; --tipbg: #1b212c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #0b0c0e; }
  body { font-family: "Halvar Breit", Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; color: var(--fg); -webkit-font-smoothing: antialiased; }
  .card { position: relative; border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.4rem 1.1rem; background: var(--panel); }
  .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .id { display: flex; align-items: center; gap: 0.85rem; }
  .logo { width: 60px; height: 60px; border-radius: 50%; flex: 0 0 auto; border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.2); background:#f4f1ea; }
  .label { font-size: 10.5px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); display: inline-block; box-shadow: 0 0 0 0 rgba(65,201,138,0.55); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(65,201,138,0.5);} 70% { box-shadow: 0 0 0 6px rgba(65,201,138,0);} 100% { box-shadow: 0 0 0 0 rgba(65,201,138,0);} }
  .price { font-size: 34px; font-weight: 750; line-height: 1.05; letter-spacing: -0.02em; display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap; }
  .usd { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .pill { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; background: var(--panel2); color: var(--accent); white-space: nowrap; }
  .pill.up { color: var(--good); } .pill.down { color: var(--err); }
  .chart { margin: 0.7rem 0 0.2rem; position: relative; }
  svg { display: block; width: 100%; height: 92px; overflow: visible; }
  .tip { position: absolute; transform: translate(-50%, calc(-100% - 10px)); background: var(--tipbg);
    border: 1px solid var(--border); border-radius: 8px; padding: 4px 9px; font-size: 11px;
    white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity .08s;
    box-shadow: 0 6px 16px rgba(0,0,0,0.28); z-index: 5; }
  .tip .tv { font-weight: 700; } .tip .td { color: var(--muted); font-size: 10px; }
  .range { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--muted); margin-top: 2px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-top: 1rem; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 0.7rem 0.8rem; }
  .stat.burn { border-color: rgba(227,194,122,0.35); background: rgba(227,194,122,0.06); }
  .stat .k { font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }
  .stat .v { font-size: 17px; font-weight: 650; margin-top: 3px; }
  .stat.burn .v { color: var(--gold); }
  .stat .s { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .foot { margin-top: 0.85rem; font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; gap: 1rem; }
  .foot a { color: var(--accent); text-decoration: none; }
  .foot a:hover { text-decoration: underline; }
  .err { color: var(--err); } .skel { color: var(--muted); }
  @media (max-width: 480px) {
    .card { padding: 1rem 1.05rem 0.95rem; border-radius: 14px; }
    .price { font-size: 28px; }
    .logo { width: 46px; height: 46px; } .id { gap: 0.7rem; }
    .top { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    svg { height: 82px; }
    .stats { grid-template-columns: 1fr; gap: 0.5rem; margin-top: 0.9rem; }
    .stat { display: flex; flex-wrap: wrap; align-items: baseline; column-gap: 1rem; row-gap: 2px; padding: 0.7rem 0.95rem; border-radius: 11px; }
    .stat .v { margin-top: 0; margin-left: auto; } .stat .s { flex-basis: 100%; margin-top: 0; }
    .foot { font-size: 10px; flex-direction: column; gap: 0.35rem; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="id">
        <img class="logo" src="./arl.png" alt="ARL" width="60" height="60" />
        <div>
          <div class="label"><span class="dot"></span> ARL Price</div>
          <div id="price" class="price skel">—</div>
          <div id="mcap" class="usd skel">—</div>
        </div>
      </div>
      <div id="pill" class="pill">24h</div>
    </div>

    <div class="chart">
      <svg id="chart" viewBox="0 0 600 92" preserveAspectRatio="none" role="img" aria-label="ARL price history"></svg>
      <div id="tip" class="tip"></div>
      <div class="range"><span id="r0">—</span><span id="r1">—</span></div>
    </div>

    <div class="stats">
      <div class="stat"><div class="k">Total Supply</div><div id="supply" class="v skel">—</div><div class="s">ARL</div></div>
      <div class="stat"><div class="k">Holders</div><div id="holders" class="v skel">—</div></div>
      <div class="stat burn"><div class="k">Burned</div><div id="burned" class="v skel">—</div><div id="burnedpct" class="s"></div></div>
    </div>

    <div class="foot">
      <span id="status">Loading…</span>
      <a href="https://solscan.io/token/6JSXRGMH6wNiukuLi4x6rSHazJMQL51WGbzirXxsmeta" target="_blank" rel="noreferrer">verify on-chain ↗</a>
    </div>
  </div>

<script>
  const RPCS = ["https://solana-rpc.publicnode.com", "https://api.mainnet-beta.solana.com"];
  let rpcIdx = 0;
  const ARL = "6JSXRGMH6wNiukuLi4x6rSHazJMQL51WGbzirXxsmeta"; // ARL mint
  const GENESIS = 25800000; // genesis supply (ARL); burned = genesis - circulating

  const $ = (id) => document.getElementById(id);
  const grp = (n, d = 0) => n.toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d });
  function fmtPrice(p) {
    if (p >= 1) return "$" + p.toLocaleString("en-US", { maximumFractionDigits: 4 });
    // small price: show 4 significant decimals
    return "$" + p.toLocaleString("en-US", { minimumFractionDigits: 6, maximumFractionDigits: 6 });
  }

  async function rpc(method, params) {
    let lastErr;
    for (let k = 0; k < RPCS.length; k++) {
      const i = (rpcIdx + k) % RPCS.length;
      try {
        const r = await fetch(RPCS[i], { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ jsonrpc: "2.0", id: 1, method, params }) });
        if (!r.ok) throw new Error("HTTP " + r.status);
        const j = await r.json();
        if (j.error) throw new Error(j.error.message || "rpc error");
        rpcIdx = i; return j;
      } catch (e) { lastErr = e; }
    }
    throw lastErr || new Error("all RPCs failed");
  }

  let CHART = null;
  function drawChart(series) {
    const svg = $("chart"), W = 600, H = 92, pad = 6;
    if (!series || !series.length) { svg.innerHTML = ""; return; }
    const vals = series.map((p) => p.price);
    let min = Math.min(...vals), max = Math.max(...vals);
    if (max - min < 1e-12) { const c = min || 1; min = c * 0.999; max = c * 1.001; }
    const n = series.length;
    const x = (i) => pad + (i * (W - 2 * pad)) / Math.max(1, n - 1);
    const y = (v) => H - pad - ((v - min) / (max - min)) * (H - 2 * pad);
    let line = "";
    series.forEach((p, i) => { line += (i === 0 ? "M" : "L") + x(i).toFixed(2) + " " + y(p.price).toFixed(2) + " "; });
    const area = line + "L" + x(n - 1).toFixed(2) + " " + (H - pad) + " L" + x(0).toFixed(2) + " " + (H - pad) + " Z";
    const dots = '<circle cx="' + x(n - 1).toFixed(2) + '" cy="' + y(series[n - 1].price).toFixed(2) + '" r="4" fill="#8aa0c8"/>';
    svg.innerHTML =
      '<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8aa0c8" stop-opacity="0.35"/><stop offset="100%" stop-color="#8aa0c8" stop-opacity="0"/></linearGradient></defs>' +
      '<path d="' + area + '" fill="url(#g)"/>' +
      '<path d="' + line + '" fill="none" stroke="#8aa0c8" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
      dots +
      '<line id="hl" x1="0" y1="' + pad + '" x2="0" y2="' + (H - pad) + '" stroke="#8aa0c8" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>' +
      '<circle id="hd" r="4.5" fill="#8aa0c8" opacity="0"/>';
    $("r0").textContent = series[0].t; $("r1").textContent = series[n - 1].t;
    CHART = { series, W, H, pad, n, x, y };
  }

  function setupHover() {
    const svg = $("chart"), tip = $("tip");
    const move = (clientX) => {
      if (!CHART) return;
      const { series, W, H, pad, n, x, y } = CHART;
      const rect = svg.getBoundingClientRect();
      const frac = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
      const step = (W - 2 * pad) / Math.max(1, n - 1);
      let idx = Math.round((frac * W - pad) / step);
      idx = Math.min(n - 1, Math.max(0, idx));
      const p = series[idx], px = x(idx), py = y(p.price);
      const hl = svg.querySelector("#hl"), hd = svg.querySelector("#hd");
      if (hl) { hl.setAttribute("x1", px); hl.setAttribute("x2", px); hl.setAttribute("opacity", "0.5"); }
      if (hd) { hd.setAttribute("cx", px); hd.setAttribute("cy", py); hd.setAttribute("opacity", "1"); }
      tip.innerHTML = '<div class="tv">' + fmtPrice(p.price) + '</div><div class="td">' + p.t + '</div>';
      tip.style.top = (py / H) * rect.height + "px";
      tip.style.opacity = "1";
      const half = tip.offsetWidth / 2;
      let lx = (px / W) * rect.width;
      lx = Math.min(rect.width - half - 6, Math.max(half + 6, lx));
      tip.style.left = lx + "px";
    };
    const hide = () => {
      const hl = svg.querySelector("#hl"), hd = svg.querySelector("#hd");
      if (hl) hl.setAttribute("opacity", "0");
      if (hd) hd.setAttribute("opacity", "0");
      tip.style.opacity = "0";
    };
    svg.addEventListener("mousemove", (e) => move(e.clientX));
    svg.addEventListener("mouseleave", hide);
    svg.addEventListener("touchstart", (e) => move(e.touches[0].clientX), { passive: true });
    svg.addEventListener("touchmove", (e) => move(e.touches[0].clientX), { passive: true });
    svg.addEventListener("touchend", hide);
  }

  async function loadLive() {
    try {
      // price from DexScreener (most-liquid pair)
      let price = null, chg = null;
      try {
        const d = await fetch("https://api.dexscreener.com/latest/dex/tokens/" + ARL).then((r) => r.json());
        const pairs = (d.pairs || []).slice().sort((a, b) => ((b.liquidity || {}).usd || 0) - ((a.liquidity || {}).usd || 0));
        if (pairs.length) { price = Number(pairs[0].priceUsd); chg = pairs[0].priceChange ? Number(pairs[0].priceChange.h24) : null; }
      } catch (e) {}

      // supply + burned from chain
      const sup = await rpc("getTokenSupply", [ARL]);
      const supply = Number(sup.result.value.uiAmount);
      const burned = Math.max(0, GENESIS - supply);

      $("supply").classList.remove("skel"); $("burned").classList.remove("skel");
      $("supply").textContent = grp(supply, 0);
      $("burned").textContent = grp(burned, burned < 10 ? 2 : 0);
      $("burnedpct").textContent = (100 * burned / GENESIS).toFixed(2) + "% of genesis";

      if (price != null) {
        $("price").classList.remove("skel"); $("mcap").classList.remove("skel");
        $("price").innerHTML = '<span>' + fmtPrice(price) + '</span>';
        $("mcap").textContent = "Mkt cap ≈ $" + grp(price * supply, 0);
        if (chg != null) {
          const up = chg >= 0;
          $("pill").className = "pill " + (up ? "up" : "down");
          $("pill").textContent = (up ? "+" : "") + chg.toFixed(2) + "% 24h";
        }
      }
      $("status").textContent = "Updated " + new Date().toISOString().slice(11, 19) + " UTC · every 30s";
      $("status").classList.remove("err");
    } catch (e) {
      $("status").textContent = "RPC unavailable, retrying…";
      $("status").classList.add("err");
    }
  }

  async function loadHistory() {
    try {
      const h = await fetch("./history.json", { cache: "no-store" }).then((r) => r.json());
      const series = (h.points || []).filter((p) => typeof p.price === "number");
      drawChart(series);
      const last = series[series.length - 1] || {};
      if (typeof last.holders === "number") { $("holders").classList.remove("skel"); $("holders").textContent = grp(last.holders); }
      else $("holders").textContent = "—";
    } catch (e) { $("holders").textContent = "—"; }
  }

  setupHover();
  loadLive(); loadHistory();
  setInterval(loadLive, 30000);

  var wfLast = 0;
  function wfMeasure(){
    var kids = document.body.children, max = 0;
    for (var i = 0; i < kids.length; i++) { var b = kids[i].getBoundingClientRect().bottom; if (b > max) max = b; }
    if (!max) max = document.body.scrollHeight;
    return Math.ceil(max) + 1;
  }
  function wfPostHeight(){ var h = wfMeasure(); if (h === wfLast) return; wfLast = h; try { parent.postMessage({ type: "wf-height", height: h }, "*"); } catch (e) {} }
  window.addEventListener("load", wfPostHeight);
  if (document.fonts && document.fonts.ready) { document.fonts.ready.then(wfPostHeight); }
  if (window.ResizeObserver) { new ResizeObserver(wfPostHeight).observe(document.body); }
  [50, 200, 500, 1000, 2000, 3500].forEach(function (t) { setTimeout(wfPostHeight, t); });
</script>
</body>
</html>
