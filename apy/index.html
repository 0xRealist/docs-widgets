<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>APY history</title>
<style>
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Rg.ttf") format("truetype"); font-weight: 400; font-display: swap; }
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Bd.ttf") format("truetype"); font-weight: 700; font-display: swap; }
  :root {
    --fg: #e9eef6; --muted: rgba(233,238,246,0.55);
    --panel: rgba(138,160,200,0.06); --panel2: rgba(138,160,200,0.10);
    --border: rgba(138,160,200,0.18); --accent: #aebfdb; --good: #41c98a; --err: #e06b6b;
    --tipbg: #1b212c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #0b0c0e; }
  body { font-family: "Halvar Breit", Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; color: var(--fg); -webkit-font-smoothing: antialiased; }
  .card { position: relative; border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.4rem 1.1rem; background: var(--panel); }
  .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .id { display: flex; align-items: center; gap: 0.85rem; }
  .logo { width: 56px; height: 56px; border-radius: 50%; flex: 0 0 auto; border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
  .label { font-size: 10.5px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); display: inline-block; box-shadow: 0 0 0 0 rgba(65,201,138,0.55); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(65,201,138,0.5);} 70% { box-shadow: 0 0 0 6px rgba(65,201,138,0);} 100% { box-shadow: 0 0 0 0 rgba(65,201,138,0);} }
  .apy { font-size: 36px; font-weight: 750; line-height: 1.05; letter-spacing: -0.02em; }
  .usd { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .chart { margin: 0.7rem 0 0.2rem; position: relative; }
  svg.ch { display: block; width: 100%; height: 96px; overflow: visible; }
  .tip { position: absolute; transform: translate(-50%, calc(-100% - 10px)); background: var(--tipbg);
    border: 1px solid var(--border); border-radius: 8px; padding: 4px 9px; font-size: 11px;
    white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity .08s;
    box-shadow: 0 6px 16px rgba(0,0,0,0.28); z-index: 5; }
  .tip .tv { font-weight: 700; }
  .tip .td { color: var(--muted); font-size: 10px; }
  .range { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--muted); margin-top: 2px; }
  .foot { margin-top: 0.85rem; font-size: 10.5px; color: var(--muted); display: flex; justify-content: space-between; gap: 1rem; }
  .err { color: var(--err); } .skel { color: var(--muted); }
  @media (max-width: 480px) {
    .card { padding: 1rem 1.05rem 0.95rem; border-radius: 14px; }
    .apy { font-size: 28px; } .logo { width: 46px; height: 46px; } .id { gap: 0.7rem; }
    .label { font-size: 10px; letter-spacing: 0.06em; }
    svg.ch { height: 84px; }
    .foot { font-size: 10px; flex-direction: column; gap: 0.35rem; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="id">
        <img id="logo" class="logo" src="./rwt.png" alt="" width="56" height="56" />
        <div>
          <div class="label"><span class="dot"></span> <span id="title">APY</span></div>
          <div id="apy" class="apy skel">—</div>
          <div id="note" class="usd">annualized · not a guarantee</div>
        </div>
      </div>
    </div>

    <div class="chart">
      <svg id="chart" class="ch" viewBox="0 0 600 96" preserveAspectRatio="none" role="img" aria-label="APY over time"></svg>
      <div id="tip" class="tip"></div>
      <div class="range"><span id="r0">—</span><span id="r1">—</span></div>
    </div>

    <div class="foot">
      <span id="status">Loading…</span>
      <span>daily on-chain snapshot</span>
    </div>
  </div>

<script>
  const BASE = "https://0xrealist.github.io/docs-widgets";
  const params = new URLSearchParams(location.search);
  const TOKEN = params.get("token") === "strwt" ? "strwt" : "rwt";
  const CFG = {
    rwt:   { src: BASE + "/book-nav/history.json", field: "nav",   label: "RWT APY",   color: "#8aa0c8", logo: "./rwt.png",   note: "annualized in USD from Book NAV growth" },
    strwt: { src: BASE + "/strwt/history.json",    field: "price", label: "stRWT APY", color: "#e3c27a", logo: "./strwt.png", note: "annualized in USD (rate × Book NAV)" },
  }[TOKEN];

  const $ = (id) => document.getElementById(id);
  const pct = (x) => (x >= 0 ? "+" : "") + x.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + "%";

  // Cumulative annualized APY of `field` up to each dated point.
  function apySeries(points, field) {
    const pts = points.filter((p) => typeof p[field] === "number" && p.t);
    if (pts.length < 2) return [];
    const v0 = pts[0][field], t0 = Date.parse(pts[0].t);
    const out = [];
    for (let i = 1; i < pts.length; i++) {
      const days = (Date.parse(pts[i].t) - t0) / 86400000;
      if (days <= 0 || v0 <= 0) continue;
      out.push({ t: pts[i].t, v: (Math.pow(pts[i][field] / v0, 365 / days) - 1) * 100 });
    }
    return out;
  }

  let CHART = null;
  function drawChart(series) {
    const svg = $("chart"), W = 600, H = 96, pad = 8;
    if (!series.length) { svg.innerHTML = ""; return; }
    let vMin = Math.min(0, ...series.map((p) => p.v)), vMax = Math.max(...series.map((p) => p.v));
    if (vMax - vMin < 1e-9) vMax = vMin + 1;
    const n = series.length;
    const x = (i) => pad + (i * (W - 2 * pad)) / Math.max(1, n - 1);
    const y = (v) => H - pad - (v - vMin) / (vMax - vMin) * (H - 2 * pad);
    const zeroY = y(0).toFixed(2);
    let line = "";
    series.forEach((p, i) => { line += (i === 0 ? "M" : "L") + x(i).toFixed(2) + " " + y(p.v).toFixed(2) + " "; });
    const area = line + "L" + x(n - 1).toFixed(2) + " " + (H - pad) + " L" + x(0).toFixed(2) + " " + (H - pad) + " Z";
    const dot = '<circle cx="' + x(n - 1).toFixed(2) + '" cy="' + y(series[n - 1].v).toFixed(2) + '" r="4" fill="' + CFG.color + '"/>';
    svg.innerHTML =
      '<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="' + CFG.color + '" stop-opacity="0.32"/><stop offset="100%" stop-color="' + CFG.color + '" stop-opacity="0"/></linearGradient></defs>' +
      '<line x1="' + pad + '" y1="' + zeroY + '" x2="' + (W - pad) + '" y2="' + zeroY + '" stroke="rgba(138,160,200,0.18)" stroke-width="1" stroke-dasharray="2 3"/>' +
      '<path d="' + area + '" fill="url(#g)"/>' +
      '<path d="' + line + '" fill="none" stroke="' + CFG.color + '" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
      dot +
      '<line id="hl" x1="0" y1="' + pad + '" x2="0" y2="' + (H - pad) + '" stroke="' + CFG.color + '" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>' +
      '<circle id="hd" r="4.5" fill="' + CFG.color + '" opacity="0"/>';
    $("r0").textContent = series[0].t; $("r1").textContent = series[n - 1].t;
    CHART = { series, W, H, pad, n, x, y };
  }

  function setupHover() {
    const svg = $("chart"), tip = $("tip");
    const move = (clientX) => {
      if (!CHART) return;
      const { series, W, H, pad, n, x, y } = CHART;
      const rect = svg.getBoundingClientRect();
      const frac = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
      const step = (W - 2 * pad) / Math.max(1, n - 1);
      let idx = Math.round((frac * W - pad) / step);
      idx = Math.min(n - 1, Math.max(0, idx));
      const p = series[idx], px = x(idx), py = y(p.v);
      const hl = svg.querySelector("#hl"), hd = svg.querySelector("#hd");
      if (hl) { hl.setAttribute("x1", px); hl.setAttribute("x2", px); hl.setAttribute("opacity", "0.5"); }
      if (hd) { hd.setAttribute("cx", px); hd.setAttribute("cy", py); hd.setAttribute("opacity", "1"); }
      tip.innerHTML = '<div class="tv">' + pct(p.v) + '</div><div class="td">' + p.t + '</div>';
      tip.style.top = (py / H) * rect.height + "px";
      tip.style.opacity = "1";
      const half = tip.offsetWidth / 2;
      let lx = (px / W) * rect.width;
      lx = Math.min(rect.width - half - 6, Math.max(half + 6, lx));
      tip.style.left = lx + "px";
    };
    const hide = () => {
      const hl = svg.querySelector("#hl"), hd = svg.querySelector("#hd");
      if (hl) hl.setAttribute("opacity", "0");
      if (hd) hd.setAttribute("opacity", "0");
      tip.style.opacity = "0";
    };
    svg.addEventListener("mousemove", (e) => move(e.clientX));
    svg.addEventListener("mouseleave", hide);
    svg.addEventListener("touchstart", (e) => move(e.touches[0].clientX), { passive: true });
    svg.addEventListener("touchmove", (e) => move(e.touches[0].clientX), { passive: true });
    svg.addEventListener("touchend", hide);
  }

  async function load() {
    try {
      $("title").textContent = CFG.label;
      $("note").textContent = CFG.note;
      $("logo").src = CFG.logo; $("logo").alt = CFG.label;
      const h = await fetch(CFG.src, { cache: "no-store" }).then((r) => r.json());
      const series = apySeries(h.points || [], CFG.field);
      drawChart(series);
      $("apy").classList.remove("skel");
      $("apy").textContent = series.length ? pct(series[series.length - 1].v) : "—";
      $("status").textContent = series.length ? "Last snapshot " + series[series.length - 1].t : "Collecting snapshots…";
      $("status").classList.remove("err");
    } catch (e) {
      $("status").textContent = "Couldn’t load snapshots, retrying…";
      $("status").classList.add("err");
    }
  }

  setupHover();
  load();
  setInterval(load, 300000);

  // Measure content height from body's children (body does not stretch to the iframe
  // viewport, so observing it never feeds back into our own height changes).
  var wfLast = 0;
  function wfMeasure(){
    var kids = document.body.children, max = 0;
    for (var i = 0; i < kids.length; i++) {
      var b = kids[i].getBoundingClientRect().bottom;
      if (b > max) max = b;
    }
    if (!max) max = document.body.scrollHeight;
    return Math.ceil(max) + 1;
  }
  function wfPostHeight(){
    var h = wfMeasure();
    if (h === wfLast) return;
    wfLast = h;
    try { parent.postMessage({ type: "wf-height", height: h }, "*"); } catch (e) {}
  }
  window.addEventListener("load", wfPostHeight);
  if (document.fonts && document.fonts.ready) { document.fonts.ready.then(wfPostHeight); }
  if (window.ResizeObserver) { new ResizeObserver(wfPostHeight).observe(document.body); }
  [50, 200, 500, 1000, 2000, 3500].forEach(function (t) { setTimeout(wfPostHeight, t); });
</script>
</body>
</html>
