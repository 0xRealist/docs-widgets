<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Areal Protocol Overview</title>
<style>
  :root {
    --fg: #11151c; --muted: rgba(17,21,28,0.55);
    --panel: rgba(138,160,200,0.07); --panel2: rgba(138,160,200,0.10);
    --border: rgba(138,160,200,0.22); --accent: #5b6f94; --good: #2fae74; --err: #c0392b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --fg: #e9eef6; --muted: rgba(233,238,246,0.55);
      --panel: rgba(138,160,200,0.06); --panel2: rgba(138,160,200,0.10);
      --border: rgba(138,160,200,0.18); --accent: #aebfdb; --good: #41c98a; --err: #e06b6b;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: transparent; }
  body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; color: var(--fg); -webkit-font-smoothing: antialiased; }
  .card { position: relative; border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.4rem 1.1rem; background: var(--panel); }
  .top { display: flex; align-items: center; gap: 0.85rem; }
  .logo { width: 50px; height: auto; flex: 0 0 auto; }
  .areal-dark { display: none; } .areal-light { display: block; }
  @media (prefers-color-scheme: dark) { .areal-dark { display: block; } .areal-light { display: none; } }
  .label { font-size: 10.5px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); display: inline-block; box-shadow: 0 0 0 0 rgba(65,201,138,0.55); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(65,201,138,0.5);} 70% { box-shadow: 0 0 0 6px rgba(65,201,138,0);} 100% { box-shadow: 0 0 0 0 rgba(65,201,138,0);} }
  .sub { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; }
  .price { font-size: 36px; font-weight: 750; line-height: 1.05; letter-spacing: -0.02em; }
  .nav { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-top: 1.1rem; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 0.85rem; }
  .stat .k { font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .tlogo { width: 23px; height: 23px; border-radius: 50%; flex: 0 0 auto; }
  .stat .v { font-size: 19px; font-weight: 700; margin-top: 4px; }
  .stat .s { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .foot { margin-top: 0.85rem; font-size: 10.5px; color: var(--muted); display: flex; justify-content: space-between; gap: 1rem; }
  .foot a { color: var(--accent); text-decoration: none; }
  .foot a:hover { text-decoration: underline; }
  .err { color: var(--err); } .skel { color: var(--muted); }
  @media (max-width: 480px) {
    .card { padding: 1rem 1rem 0.9rem; border-radius: 14px; }
    .price { font-size: 30px; } .logo { width: 44px; height: 44px; } .top { gap: 0.65rem; }
    .stats { gap: 0.45rem; } .stat { padding: 0.6rem 0.65rem; border-radius: 10px; }
    .stat .k { font-size: 9px; } .stat .v { font-size: 16px; } .stat .s { font-size: 11px; }
    .foot { font-size: 9.5px; flex-direction: column; gap: 0.3rem; }
  }
  @media (max-width: 360px) { .stats { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <img class="logo areal-light" src="./areal-dark.svg" alt="Areal" />
      <img class="logo areal-dark" src="./areal-white.svg" alt="Areal" />
      <div>
        <div class="label"><span class="dot"></span> Areal Finance</div>
        <div class="sub">RWA Basket Value</div>
        <div id="tvl" class="price skel">$—</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="k">Unique holders</div><div id="holders" class="v skel">—</div></div>
      <div class="stat"><div class="k"><img class="tlogo" src="./rwt.png" alt="">RWT APY</div><div id="rwtapy" class="v skel">—</div><div id="rwtusd" class="s"></div></div>
      <div class="stat"><div class="k"><img class="tlogo" src="./strwt.png" alt="">stRWT APY</div><div id="stapy" class="v skel">—</div><div id="stusd" class="s"></div></div>
    </div>

    <div class="foot">
      <span id="status">Loading…</span>
      <span>APY annualized from history · not a guarantee</span>
    </div>
  </div>

<script>
  const RPCS = ["https://solana-rpc.publicnode.com", "https://api.mainnet-beta.solana.com"];
  let rpcIdx = 0;
  const EARN = "5GyVeryGnTPPtfteYaj5pNUjE9s2DDDpDnccgoFjV8L3"; // EarnConfig PDA
  const RWT = "RWTeFt9M635Tf6w6yveAoXQR2ZwfXs7MfA7W3grDuGT";
  const BASE = "https://0xrealist.github.io/docs-widgets";

  const $ = (id) => document.getElementById(id);
  const fmt = (n, d) => n.toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d });
  const grp = (n) => n.toLocaleString("en-US", { maximumFractionDigits: 0 });
  const pct = (x) => (x >= 0 ? "+" : "") + x.toLocaleString("en-US", { maximumFractionDigits: x >= 100 ? 0 : 2 }) + "%";

  async function rpc(method, params) {
    let lastErr;
    for (let k = 0; k < RPCS.length; k++) {
      const i = (rpcIdx + k) % RPCS.length;
      try {
        const r = await fetch(RPCS[i], { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ jsonrpc: "2.0", id: 1, method, params }) });
        if (!r.ok) throw new Error("HTTP " + r.status);
        const j = await r.json();
        if (j.error) throw new Error(j.error.message || "rpc error");
        rpcIdx = i; return j;
      } catch (e) { lastErr = e; }
    }
    throw lastErr || new Error("all RPCs failed");
  }

  function apy(series, field) {
    const pts = (series || []).filter((p) => typeof p[field] === "number" && p.t);
    if (pts.length < 2) return 0;
    const f = pts[0], l = pts[pts.length - 1];
    const days = (Date.parse(l.t) - Date.parse(f.t)) / 86400000;
    if (days <= 0 || f[field] <= 0) return 0;
    return (Math.pow(l[field] / f[field], 365 / days) - 1) * 100;
  }

  async function loadLive() {
    try {
      const [earn, sup] = await Promise.all([
        rpc("getAccountInfo", [EARN, { encoding: "base64" }]),
        rpc("getTokenSupply", [RWT]),
      ]);
      const bin = atob(earn.result.value.data[0]);
      let capital = 0n;
      for (let i = 0; i < 16; i++) capital += BigInt(bin.charCodeAt(8 + i)) << (8n * BigInt(i));
      const rwtSupply = Number(sup.result.value.amount);
      const nav = rwtSupply === 0 ? 1 : Number(capital) / rwtSupply;
      $("tvl").classList.remove("skel");
      $("tvl").textContent = "$" + grp(Number(capital) / 1e6);
      $("rwtusd").textContent = "$" + fmt(nav, 6);
      $("status").textContent = "Updated " + new Date().toISOString().slice(11, 19) + " UTC · every 30s";
      $("status").classList.remove("err");
    } catch (e) {
      $("status").textContent = "RPC unavailable, retrying…";
      $("status").classList.add("err");
    }
  }

  async function loadHistory() {
    try {
      const [book, st] = await Promise.all([
        fetch(BASE + "/book-nav/history.json", { cache: "no-store" }).then((r) => r.json()),
        fetch(BASE + "/strwt/history.json", { cache: "no-store" }).then((r) => r.json()),
      ]);
      const bookPts = book.points || [], stPts = st.points || [];
      const last = bookPts[bookPts.length - 1] || {};
      const h = typeof last.holders_unique === "number" ? last.holders_unique : last.holders;
      $("holders").classList.remove("skel");
      $("holders").textContent = typeof h === "number" ? grp(h) : "—";

      const rApy = apy(bookPts, "nav"), sApy = apy(stPts, "rate");
      $("rwtapy").classList.remove("skel"); $("stapy").classList.remove("skel");
      $("rwtapy").textContent = rApy === null ? "—" : pct(rApy);
      $("stapy").textContent = sApy === null ? "—" : pct(sApy);

      const stLast = stPts[stPts.length - 1] || {};
      if (typeof stLast.price === "number") $("stusd").textContent = "$" + fmt(stLast.price, 2);
    } catch (e) { /* keep skeletons */ }
  }

  loadLive(); loadHistory();
  setInterval(loadLive, 30000);
</script>
</body>
</html>
