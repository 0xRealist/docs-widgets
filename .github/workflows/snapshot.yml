name: snapshot

on:
  schedule:
    - cron: "7,37 * * * *" # every 30 min (one point per day, refreshed each run)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Take snapshot
        env:
          RPC: ${{ secrets.RPC_URL }}
        run: node scripts/snapshot.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add book-nav/history.json strwt/history.json
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "snapshot: $(date -u +%F)"
            git push
          fi
