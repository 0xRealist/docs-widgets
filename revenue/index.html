<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RWA Basket Revenue</title>
<style>
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Rg.ttf") format("truetype"); font-weight: 400; font-display: swap; }
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Bd.ttf") format("truetype"); font-weight: 700; font-display: swap; }
  :root {
    --fg: #e9eef6; --muted: rgba(233,238,246,0.55);
    --panel: rgba(138,160,200,0.06); --panel2: rgba(138,160,200,0.10);
    --border: rgba(138,160,200,0.18); --accent: #aebfdb; --good: #41c98a;
    --track: rgba(138,160,200,0.14);
    --assets: #8aa0c8; --cash: #5fbf9b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #0b0c0e; }
  body { font-family: "Halvar Breit", Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; color: var(--fg); -webkit-font-smoothing: antialiased; }
  .card { border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.4rem 1.15rem; background: var(--panel); }
  .hd { display: flex; align-items: center; gap: 8px; margin-bottom: 0.9rem; }
  .hd-title { font-size: 11px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); }
  .lbl { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .hero { font-size: 34px; font-weight: 750; letter-spacing: -0.02em; margin-top: 2px; }
  .comp { display: flex; height: 10px; border-radius: 999px; overflow: hidden; background: var(--track); margin: 0.9rem 0 0.6rem; gap: 2px; }
  .comp > span { height: 100%; }
  .legend { display: flex; flex-wrap: wrap; gap: 1.1rem; font-size: 12px; color: var(--muted); }
  .legend .dot { width: 9px; height: 9px; border-radius: 3px; display: inline-block; margin-right: 6px; vertical-align: -1px; }
  .legend b { color: var(--fg); font-weight: 700; }
  .mini { display: flex; gap: 1.6rem; margin: 1.1rem 0 1.2rem; }
  .mini .k { font-size: 9.5px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }
  .mini .v { font-size: 18px; font-weight: 700; margin-top: 3px; }
  .bd-h { font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.7rem; }
  .ra-row { margin-bottom: 0.95rem; }
  .ra-top { display: flex; justify-content: space-between; gap: 0.6rem; align-items: baseline; }
  .ra-name { font-size: 0.95rem; font-weight: 700; }
  .ra-val { font-size: 0.95rem; font-weight: 700; }
  .ra-bar { height: 8px; border-radius: 999px; background: var(--track); overflow: hidden; margin: 6px 0 4px; }
  .ra-bar > i { display: block; height: 100%; background: linear-gradient(90deg,#8aa0c8,#aebfdb); border-radius: 999px; }
  .ra-sub { display: flex; justify-content: space-between; gap: 0.6rem; font-size: 11px; color: var(--muted); }
  .ra-yield { color: var(--good); font-weight: 600; }
  .foot { margin-top: 0.9rem; font-size: 10.5px; color: var(--muted); }
  .skel { color: var(--muted); }
  @media (max-width: 480px) {
    .card { padding: 1rem 1rem 0.9rem; border-radius: 14px; }
    .hero { font-size: 28px; } .mini { gap: 1.1rem; } .mini .v { font-size: 16px; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="hd"><span class="hd-title">RWA Basket · revenue</span></div>

    <div class="lbl">Basket value</div>
    <div id="basket" class="hero skel">$—</div>

    <div class="comp"><span id="seg-a" style="width:0;background:var(--assets)"></span><span id="seg-c" style="width:0;background:var(--cash)"></span></div>
    <div class="legend">
      <span><span class="dot" style="background:var(--assets)"></span>Assets <b id="lg-a">—</b></span>
      <span><span class="dot" style="background:var(--cash)"></span>Cash <b id="lg-c">—</b></span>
    </div>

    <div class="mini">
      <div><div class="k">Assets</div><div id="count" class="v skel">—</div></div>
      <div><div class="k">Yield generated</div><div id="yield" class="v skel">—</div></div>
    </div>

    <div class="bd-h">Breakdown by asset</div>
    <div id="rows"><div class="skel">Loading…</div></div>

    <div class="foot" id="foot">Basket value is read on-chain; assets from the RWA registry.</div>
  </div>

<script>
  const RPCS = ["https://solana-rpc.publicnode.com", "https://api.mainnet-beta.solana.com"];
  let rpcIdx = 0;
  const EARN = "5GyVeryGnTPPtfteYaj5pNUjE9s2DDDpDnccgoFjV8L3"; // EarnConfig PDA (RWA basket value)
  const $ = (id) => document.getElementById(id);
  const usd = (n) => "$" + n.toLocaleString("en-US", { maximumFractionDigits: 0 });

  async function rpc(method, params) {
    let lastErr;
    for (let k = 0; k < RPCS.length; k++) {
      const i = (rpcIdx + k) % RPCS.length;
      try {
        const r = await fetch(RPCS[i], { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ jsonrpc: "2.0", id: 1, method, params }) });
        if (!r.ok) throw new Error("HTTP " + r.status);
        const j = await r.json();
        if (j.error) throw new Error(j.error.message || "rpc error");
        rpcIdx = i; return j;
      } catch (e) { lastErr = e; }
    }
    throw lastErr || new Error("all RPCs failed");
  }

  async function basketValueUsd() {
    const earn = await rpc("getAccountInfo", [EARN, { encoding: "base64" }]);
    const bin = atob(earn.result.value.data[0]);
    let capital = 0n;
    for (let i = 0; i < 16; i++) capital += BigInt(bin.charCodeAt(8 + i)) << (8n * BigInt(i));
    return Number(capital) / 1e6;
  }

  async function load() {
    try {
      const data = await fetch("./assets.json", { cache: "no-store" }).then((r) => r.json());
      const assets = (data.assets || []).slice();
      const deployed = assets.reduce((s, a) => s + (a.value || 0), 0);
      const totalYield = assets.reduce((s, a) => s + (a.yield || 0), 0);

      let basket = deployed;
      try { basket = await basketValueUsd(); } catch (e) { /* fallback to deployed */ }
      const cash = Math.max(0, basket - deployed);

      $("basket").classList.remove("skel"); $("count").classList.remove("skel"); $("yield").classList.remove("skel");
      $("basket").textContent = usd(basket);
      $("count").textContent = assets.length;
      $("yield").textContent = usd(totalYield);
      $("lg-a").textContent = usd(deployed);
      $("lg-c").textContent = usd(cash);
      const aShare = basket > 0 ? (100 * deployed / basket) : 100;
      $("seg-a").style.width = aShare.toFixed(2) + "%";
      $("seg-c").style.width = (100 - aShare).toFixed(2) + "%";

      assets.sort((a, b) => (b.yield || 0) - (a.yield || 0) || (b.value || 0) - (a.value || 0));
      $("rows").innerHTML = assets.map((a) => {
        const share = deployed > 0 ? (100 * (a.value || 0) / deployed) : 0;
        const y = "yield " + usd(a.yield || 0);
        return '<div class="ra-row">' +
          '<div class="ra-top"><span class="ra-name">' + a.name + '</span><span class="ra-val">' + usd(a.value || 0) + '</span></div>' +
          '<div class="ra-bar"><i style="width:' + share.toFixed(1) + '%"></i></div>' +
          '<div class="ra-sub"><span>' + (a.type || "") + (a.location ? " · " + a.location : "") + '</span>' +
          '<span>' + share.toFixed(1) + "% of assets · " + y + '</span></div>' +
          '</div>';
      }).join("") || '<div class="skel">No assets yet.</div>';
    } catch (e) {
      $("foot").textContent = "Couldn’t load the data.";
    }
  }
  load();

  // Measure content height from body's children (body does not stretch to the iframe
  // viewport, so observing it never feeds back into our own height changes).
  var wfLast = 0;
  function wfMeasure(){
    var kids = document.body.children, max = 0;
    for (var i = 0; i < kids.length; i++) {
      var b = kids[i].getBoundingClientRect().bottom;
      if (b > max) max = b;
    }
    if (!max) max = document.body.scrollHeight;
    return Math.ceil(max) + 1;
  }
  function wfPostHeight(){
    var h = wfMeasure();
    if (h === wfLast) return;
    wfLast = h;
    try { parent.postMessage({ type: "wf-height", height: h }, "*"); } catch (e) {}
  }
  window.addEventListener("load", wfPostHeight);
  if (document.fonts && document.fonts.ready) { document.fonts.ready.then(wfPostHeight); }
  if (window.ResizeObserver) { new ResizeObserver(wfPostHeight).observe(document.body); }
  [50, 200, 500, 1000, 2000, 3500].forEach(function (t) { setTimeout(wfPostHeight, t); });
</script>
</body>
</html>
