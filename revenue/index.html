<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RWA Basket Revenue</title>
<style>
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Rg.ttf") format("truetype"); font-weight: 400; font-display: swap; }
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Bd.ttf") format("truetype"); font-weight: 700; font-display: swap; }
  :root {
    --fg: #e9eef6; --muted: rgba(233,238,246,0.55);
    --panel: rgba(138,160,200,0.06); --panel2: rgba(138,160,200,0.10);
    --border: rgba(138,160,200,0.18); --accent: #aebfdb; --good: #41c98a; --err: #e06b6b;
    --track: rgba(138,160,200,0.14);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #0b0c0e; }
  body { font-family: "Halvar Breit", Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; color: var(--fg); -webkit-font-smoothing: antialiased; }
  .card { border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.4rem 1.15rem; background: var(--panel); }
  .hd { display: flex; align-items: center; gap: 8px; margin-bottom: 0.9rem; }
  .hd-title { font-size: 11px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-bottom: 1.2rem; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 0.7rem 0.85rem; }
  .stat .k { font-size: 9.5px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }
  .stat .v { font-size: 19px; font-weight: 700; margin-top: 4px; }
  .bd-h { font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.7rem; }
  .ra-row { margin-bottom: 0.95rem; }
  .ra-top { display: flex; justify-content: space-between; gap: 0.6rem; align-items: baseline; }
  .ra-name { font-size: 0.95rem; font-weight: 700; }
  .ra-val { font-size: 0.95rem; font-weight: 700; }
  .ra-bar { height: 8px; border-radius: 999px; background: var(--track); overflow: hidden; margin: 6px 0 4px; }
  .ra-bar > i { display: block; height: 100%; background: linear-gradient(90deg,#8aa0c8,#aebfdb); border-radius: 999px; }
  .ra-sub { display: flex; justify-content: space-between; gap: 0.6rem; font-size: 11px; color: var(--muted); }
  .ra-yield { color: var(--good); font-weight: 600; }
  .foot { margin-top: 0.9rem; font-size: 10.5px; color: var(--muted); }
  .skel { color: var(--muted); }
  @media (max-width: 480px) {
    .card { padding: 1rem 1rem 0.9rem; border-radius: 14px; }
    .stats { gap: 0.45rem; } .stat { padding: 0.55rem 0.6rem; } .stat .k { font-size: 9px; } .stat .v { font-size: 16px; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="hd"><span class="hd-title">RWA Basket · revenue</span></div>

    <div class="stats">
      <div class="stat"><div class="k">Assets</div><div id="count" class="v skel">—</div></div>
      <div class="stat"><div class="k">Total value</div><div id="total" class="v skel">—</div></div>
      <div class="stat"><div class="k">Yield generated</div><div id="yield" class="v skel">—</div></div>
    </div>

    <div class="bd-h">Breakdown by asset</div>
    <div id="rows"><div class="skel">Loading…</div></div>

    <div class="foot" id="foot">From the RWA asset registry.</div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const usd = (n) => "$" + n.toLocaleString("en-US", { maximumFractionDigits: 0 });

  async function load() {
    try {
      const data = await fetch("./assets.json", { cache: "no-store" }).then((r) => r.json());
      const assets = (data.assets || []).slice();
      const totalValue = assets.reduce((s, a) => s + (a.value || 0), 0);
      const totalYield = assets.reduce((s, a) => s + (a.yield || 0), 0);

      $("count").classList.remove("skel"); $("total").classList.remove("skel"); $("yield").classList.remove("skel");
      $("count").textContent = assets.length;
      $("total").textContent = usd(totalValue);
      $("yield").textContent = usd(totalYield);

      assets.sort((a, b) => (b.yield || 0) - (a.yield || 0) || (b.value || 0) - (a.value || 0));
      $("rows").innerHTML = assets.map((a) => {
        const share = totalValue > 0 ? (100 * (a.value || 0) / totalValue) : 0;
        const y = (a.yield || 0) > 0 ? '<span class="ra-yield">yield ' + usd(a.yield) + "</span>" : "yield " + usd(a.yield || 0);
        return '<div class="ra-row">' +
          '<div class="ra-top"><span class="ra-name">' + a.name + '</span><span class="ra-val">' + usd(a.value || 0) + '</span></div>' +
          '<div class="ra-bar"><i style="width:' + share.toFixed(1) + '%"></i></div>' +
          '<div class="ra-sub"><span>' + (a.type || "") + (a.location ? " · " + a.location : "") + '</span>' +
          '<span>' + share.toFixed(1) + "% · " + y + '</span></div>' +
          '</div>';
      }).join("") || '<div class="skel">No assets yet.</div>';
    } catch (e) {
      $("foot").textContent = "Couldn’t load the asset registry.";
    }
  }
  load();
</script>
</body>
</html>
