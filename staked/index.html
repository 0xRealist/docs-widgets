<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Staked RWT supply</title>
<style>
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Rg.ttf") format("truetype"); font-weight: 400; font-display: swap; }
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Bd.ttf") format("truetype"); font-weight: 700; font-display: swap; }
  :root {
    --fg: #e9eef6; --muted: rgba(233,238,246,0.55);
    --panel: rgba(138,160,200,0.06); --panel2: rgba(138,160,200,0.10);
    --border: rgba(138,160,200,0.18); --accent: #aebfdb; --good: #41c98a; --err: #e06b6b;
    --tipbg: #1b212c; --abs: #8aa0c8; --pct: #41c98a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #0b0c0e; }
  body { font-family: "Halvar Breit", Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; color: var(--fg); -webkit-font-smoothing: antialiased; }
  .card { position: relative; border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.4rem 1.1rem; background: var(--panel); }
  .top { display: flex; align-items: center; gap: 0.95rem; margin-bottom: 0.1rem; }
  .logo { width: 56px; height: 56px; border-radius: 50%; flex: 0 0 auto; border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
  .grow { flex: 1 1 auto; min-width: 0; }
  .hd { display: flex; align-items: center; gap: 8px; margin-bottom: 0.55rem; }
  .hd-title { font-size: 11px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); display: inline-block; box-shadow: 0 0 0 0 rgba(65,201,138,0.55); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(65,201,138,0.5);} 70% { box-shadow: 0 0 0 6px rgba(65,201,138,0);} 100% { box-shadow: 0 0 0 0 rgba(65,201,138,0);} }
  .sub { margin-left: auto; font-size: 10px; color: var(--muted); letter-spacing: 0.04em; }
  .legend { display: flex; gap: 1.6rem; flex-wrap: wrap; }
  .leg .lk { font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .leg .lk i { width: 9px; height: 9px; border-radius: 3px; display: inline-block; }
  .leg .lv { font-size: 24px; font-weight: 750; letter-spacing: -0.02em; margin-top: 3px; }
  .leg .lv small { font-size: 13px; font-weight: 600; color: var(--muted); margin-left: 3px; }
  .chart { margin: 1rem 0 0.2rem; position: relative; }
  svg.ch { display: block; width: 100%; height: 104px; overflow: visible; }
  .tip { position: absolute; transform: translate(-50%, calc(-100% - 10px)); background: var(--tipbg);
    border: 1px solid var(--border); border-radius: 8px; padding: 5px 9px; font-size: 11px;
    white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity .08s;
    box-shadow: 0 6px 16px rgba(0,0,0,0.28); z-index: 5; }
  .tip .tr { display: flex; align-items: center; gap: 6px; font-weight: 700; }
  .tip .tr i { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }
  .tip .td { color: var(--muted); font-size: 10px; margin-top: 2px; }
  .range { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--muted); margin-top: 2px; }
  .foot { margin-top: 0.85rem; font-size: 10.5px; color: var(--muted); display: flex; justify-content: space-between; gap: 1rem; }
  .err { color: var(--err); } .skel { color: var(--muted); }
  @media (max-width: 480px) {
    .card { padding: 1rem 1.05rem 0.95rem; border-radius: 14px; }
    .top { gap: 0.7rem; } .logo { width: 46px; height: 46px; }
    .legend { gap: 1.4rem; } .leg .lv { font-size: 20px; } .leg .lv small { font-size: 12px; }
    svg.ch { height: 92px; }
    .foot { font-size: 10px; flex-direction: column; gap: 0.35rem; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <img class="logo" src="./strwt.png" alt="stRWT" width="56" height="56" />
      <div class="grow">
        <div class="hd">
          <span class="dot"></span>
          <span class="hd-title">Staked RWT</span>
          <span class="sub">from daily snapshots</span>
        </div>
        <div class="legend">
          <div class="leg"><div class="lk"><i style="background:var(--abs)"></i> stRWT supply</div><div id="abs" class="lv skel">—</div></div>
          <div class="leg"><div class="lk"><i style="background:var(--pct)"></i> RWT staked</div><div id="pct" class="lv skel">—</div></div>
        </div>
      </div>
    </div>

    <div class="chart">
      <svg id="chart" class="ch" viewBox="0 0 600 104" preserveAspectRatio="none" role="img" aria-label="Staked RWT over time"></svg>
      <div id="tip" class="tip"></div>
      <div class="range"><span id="r0">—</span><span id="r1">—</span></div>
    </div>

    <div class="foot">
      <span id="status">Loading…</span>
      <span>stRWT in circulation · % of RWT staked</span>
    </div>
  </div>

<script>
  const BASE = "https://0xrealist.github.io/docs-widgets";
  const ABS_C = "#8aa0c8", PCT_C = "#41c98a";
  const $ = (id) => document.getElementById(id);
  const grp = (n) => n.toLocaleString("en-US", { maximumFractionDigits: 0 });
  const pctTxt = (x) => x.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + "%";

  let CHART = null;
  function drawChart(pts) {
    const svg = $("chart"), W = 600, H = 104, pad = 8;
    if (!pts.length) { svg.innerHTML = ""; return; }
    const absV = pts.map((p) => p.abs);
    const pctVals = pts.filter((p) => typeof p.pct === "number").map((p) => p.pct);
    let aMin = Math.min(...absV), aMax = Math.max(...absV);
    if (aMax - aMin < 1e-9) { aMin = Math.max(0, aMin * 0.999); aMax = aMax * 1.001 || 1; }
    let bMin = pctVals.length ? Math.min(...pctVals) : 0, bMax = pctVals.length ? Math.max(...pctVals) : 1;
    if (bMax - bMin < 1e-9) { bMin = Math.max(0, bMin - 0.5); bMax = bMax + 0.5; }
    const n = pts.length;
    const x = (i) => pad + (i * (W - 2 * pad)) / Math.max(1, n - 1);
    // Separate vertical bands so the two lines never overlap: share (%) on top,
    // absolute amount on the bottom.
    const aTop = H * 0.54, aBot = H - pad; // absolute -> lower band
    const bTop = pad, bBot = H * 0.46;     // share -> upper band
    const yA = (v) => aBot - (v - aMin) / (aMax - aMin) * (aBot - aTop);
    const yB = (v) => bBot - (v - bMin) / (bMax - bMin) * (bBot - bTop);

    function lineFor(key, scale, color) {
      const s = pts.map((p, i) => ({ i, v: p[key] })).filter((o) => typeof o.v === "number");
      if (!s.length) return "";
      if (s.length === 1) return '<circle cx="' + x(s[0].i).toFixed(2) + '" cy="' + scale(s[0].v).toFixed(2) + '" r="3.5" fill="' + color + '"/>';
      let d = ""; s.forEach((o, k) => { d += (k === 0 ? "M" : "L") + x(o.i).toFixed(2) + " " + scale(o.v).toFixed(2) + " "; });
      const last = s[s.length - 1];
      return '<path d="' + d + '" fill="none" stroke="' + color + '" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
        '<circle cx="' + x(last.i).toFixed(2) + '" cy="' + scale(last.v).toFixed(2) + '" r="3.5" fill="' + color + '"/>';
    }
    svg.innerHTML =
      lineFor("abs", yA, ABS_C) + lineFor("pct", yB, PCT_C) +
      '<line id="hl" x1="0" y1="' + pad + '" x2="0" y2="' + (H - pad) + '" stroke="#aebfdb" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>';
    $("r0").textContent = pts[0].t; $("r1").textContent = pts[n - 1].t;
    CHART = { pts, W, H, pad, n, x, yA, yB };
  }

  function setupHover() {
    const svg = $("chart"), tip = $("tip");
    const move = (clientX) => {
      if (!CHART) return;
      const { pts, W, pad, n, x } = CHART;
      const rect = svg.getBoundingClientRect();
      const frac = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
      const step = (W - 2 * pad) / Math.max(1, n - 1);
      let idx = Math.round((frac * W - pad) / step);
      idx = Math.min(n - 1, Math.max(0, idx));
      const p = pts[idx];
      const hl = svg.querySelector("#hl");
      if (hl) { const hx = x(idx); hl.setAttribute("x1", hx); hl.setAttribute("x2", hx); hl.setAttribute("opacity", "0.5"); }
      let html = '<div class="tr"><i style="background:' + ABS_C + '"></i>' + grp(p.abs) + ' stRWT</div>';
      if (typeof p.pct === "number") html += '<div class="tr"><i style="background:' + PCT_C + '"></i>' + pctTxt(p.pct) + ' of RWT staked</div>';
      html += '<div class="td">' + p.t + '</div>';
      tip.innerHTML = html;
      tip.style.top = "0px"; tip.style.opacity = "1";
      const half = tip.offsetWidth / 2;
      let lx = (x(idx) / W) * rect.width;
      lx = Math.min(rect.width - half - 6, Math.max(half + 6, lx));
      tip.style.left = lx + "px";
    };
    const hide = () => { const hl = svg.querySelector("#hl"); if (hl) hl.setAttribute("opacity", "0"); tip.style.opacity = "0"; };
    svg.addEventListener("mousemove", (e) => move(e.clientX));
    svg.addEventListener("mouseleave", hide);
    svg.addEventListener("touchstart", (e) => move(e.touches[0].clientX), { passive: true });
    svg.addEventListener("touchmove", (e) => move(e.touches[0].clientX), { passive: true });
    svg.addEventListener("touchend", hide);
  }

  async function load() {
    try {
      const [book, st] = await Promise.all([
        fetch(BASE + "/book-nav/history.json", { cache: "no-store" }).then((r) => r.json()),
        fetch(BASE + "/strwt/history.json", { cache: "no-store" }).then((r) => r.json()),
      ]);
      const supplyByDate = {};
      (book.points || []).forEach((p) => { if (typeof p.supply === "number") supplyByDate[p.t] = p.supply; });
      const pts = (st.points || [])
        .filter((p) => p.t && (typeof p.supply === "number" || typeof p.staked === "number"))
        .map((p) => {
          // stRWT in circulation (fallback: derive from staked RWT and the rate)
          const stSupply = typeof p.supply === "number"
            ? p.supply
            : (typeof p.staked === "number" && p.rate ? Math.round(p.staked / p.rate) : null);
          const rwtSup = supplyByDate[p.t];
          // share of total RWT supply that is staked
          const pct = typeof p.staked === "number" && typeof rwtSup === "number" && rwtSup > 0
            ? (100 * p.staked / rwtSup) : null;
          return { t: p.t, abs: stSupply, pct };
        })
        .filter((p) => typeof p.abs === "number");

      drawChart(pts);
      const last = pts[pts.length - 1];
      $("abs").classList.remove("skel"); $("pct").classList.remove("skel");
      $("abs").innerHTML = last ? grp(last.abs) + '<small>stRWT</small>' : "—";
      $("pct").textContent = last && typeof last.pct === "number" ? pctTxt(last.pct) : "—";
      $("status").textContent = last ? "Last snapshot " + last.t : "Collecting snapshots…";
      $("status").classList.remove("err");
    } catch (e) {
      $("status").textContent = "Couldn’t load snapshots, retrying…";
      $("status").classList.add("err");
    }
  }

  setupHover();
  load();
  setInterval(load, 300000);

  // Measure content height from body's children (body does not stretch to the iframe
  // viewport, so observing it never feeds back into our own height changes).
  var wfLast = 0;
  function wfMeasure(){
    var kids = document.body.children, max = 0;
    for (var i = 0; i < kids.length; i++) {
      var b = kids[i].getBoundingClientRect().bottom;
      if (b > max) max = b;
    }
    if (!max) max = document.body.scrollHeight;
    return Math.ceil(max) + 1;
  }
  function wfPostHeight(){
    var h = wfMeasure();
    if (h === wfLast) return;
    wfLast = h;
    try { parent.postMessage({ type: "wf-height", height: h }, "*"); } catch (e) {}
  }
  window.addEventListener("load", wfPostHeight);
  if (document.fonts && document.fonts.ready) { document.fonts.ready.then(wfPostHeight); }
  if (window.ResizeObserver) { new ResizeObserver(wfPostHeight).observe(document.body); }
  [50, 200, 500, 1000, 2000, 3500].forEach(function (t) { setTimeout(wfPostHeight, t); });
</script>
</body>
</html>
