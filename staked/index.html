<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Staked RWT supply</title>
<style>
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Rg.ttf") format("truetype"); font-weight: 400; font-display: swap; }
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Bd.ttf") format("truetype"); font-weight: 700; font-display: swap; }
  :root {
    --fg: #e9eef6; --muted: rgba(233,238,246,0.55);
    --panel: rgba(138,160,200,0.06); --panel2: rgba(138,160,200,0.10);
    --border: rgba(138,160,200,0.18); --accent: #aebfdb; --good: #41c98a; --err: #e06b6b;
    --tipbg: #1b212c; --abs: #8aa0c8; --pct: #41c98a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #0b0c0e; }
  body { font-family: "Halvar Breit", Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; color: var(--fg); -webkit-font-smoothing: antialiased; }
  .card { position: relative; border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.4rem 1.1rem; background: var(--panel); }
  .top { display: flex; align-items: center; gap: 0.95rem; margin-bottom: 0.6rem; }
  .logo { width: 48px; height: 48px; border-radius: 50%; flex: 0 0 auto; border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
  .grow { flex: 1 1 auto; min-width: 0; }
  .hd { display: flex; align-items: center; gap: 8px; }
  .hd-title { font-size: 11px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); display: inline-block; box-shadow: 0 0 0 0 rgba(65,201,138,0.55); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(65,201,138,0.5);} 70% { box-shadow: 0 0 0 6px rgba(65,201,138,0);} 100% { box-shadow: 0 0 0 0 rgba(65,201,138,0);} }
  .sub { margin-left: auto; font-size: 10px; color: var(--muted); letter-spacing: 0.04em; }
  .rows { margin-top: 0.4rem; }
  .row { display: flex; align-items: center; gap: 1.1rem; padding: 0.8rem 0; }
  .row + .row { border-top: 1px solid var(--border); }
  .meta { flex: 0 0 auto; width: 128px; }
  .meta .k { font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .meta .k i { width: 9px; height: 9px; border-radius: 3px; display: inline-block; flex: 0 0 auto; }
  .meta .v { font-size: 22px; font-weight: 750; letter-spacing: -0.02em; margin-top: 4px; }
  .meta .v small { font-size: 12px; font-weight: 600; color: var(--muted); margin-left: 3px; }
  .spark { flex: 1 1 auto; min-width: 0; }
  svg.sp { display: block; width: 100%; height: 48px; overflow: visible; }
  .tip { position: absolute; transform: translate(-50%, -100%); background: var(--tipbg);
    border: 1px solid var(--border); border-radius: 8px; padding: 4px 9px; font-size: 11px;
    white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity .08s;
    box-shadow: 0 6px 16px rgba(0,0,0,0.28); z-index: 5; }
  .tip .tv { font-weight: 700; }
  .tip .td { color: var(--muted); font-size: 10px; }
  .range { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--muted); margin-top: 0.5rem; padding-left: 128px; }
  .foot { margin-top: 0.85rem; font-size: 10.5px; color: var(--muted); display: flex; justify-content: space-between; gap: 1rem; }
  .err { color: var(--err); } .skel { color: var(--muted); }
  @media (max-width: 480px) {
    .card { padding: 1rem 1.05rem 0.95rem; border-radius: 14px; }
    .top { gap: 0.7rem; } .logo { width: 44px; height: 44px; }
    .row { gap: 0.8rem; padding: 0.7rem 0; }
    .meta { width: 96px; } .meta .v { font-size: 18px; } .meta .v small { font-size: 11px; }
    svg.sp { height: 42px; }
    .range { padding-left: 96px; }
    .foot { font-size: 10px; flex-direction: column; gap: 0.35rem; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <img class="logo" src="./strwt.png" alt="stRWT" width="48" height="48" />
      <div class="grow">
        <div class="hd">
          <span class="dot"></span>
          <span class="hd-title">Staked RWT</span>
          <span class="sub">from daily snapshots</span>
        </div>
      </div>
    </div>

    <div class="rows">
      <div class="row">
        <div class="meta"><div class="k"><i style="background:var(--abs)"></i> stRWT supply</div><div id="absv" class="v skel">—</div></div>
        <div class="spark"><svg id="sp-abs" class="sp" viewBox="0 0 600 48" preserveAspectRatio="none" aria-label="stRWT supply"></svg></div>
      </div>
      <div class="row">
        <div class="meta"><div class="k"><i style="background:var(--pct)"></i> RWT staked</div><div id="pctv" class="v skel">—</div></div>
        <div class="spark"><svg id="sp-pct" class="sp" viewBox="0 0 600 48" preserveAspectRatio="none" aria-label="Share of RWT supply staked"></svg></div>
      </div>
    </div>

    <div class="range"><span id="r0">—</span><span id="r1">—</span></div>
    <div id="tip" class="tip"></div>

    <div class="foot">
      <span id="status">Loading…</span>
      <span>stRWT in circulation · % of RWT staked</span>
    </div>
  </div>

<script>
  const BASE = "https://0xrealist.github.io/docs-widgets";
  const ABS_C = "#8aa0c8", PCT_C = "#41c98a";
  const $ = (id) => document.getElementById(id);
  const grp = (n) => n.toLocaleString("en-US", { maximumFractionDigits: 0 });
  const pctTxt = (x) => x.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + "%";

  // Draw a self-contained sparkline (own scale) into an svg; return chart context for hover.
  function spark(svgId, series, color, fmt) {
    const svg = $(svgId), W = 600, H = 48, pad = 6;
    if (!series.length) { svg.innerHTML = ""; return null; }
    let min = Math.min(...series.map((p) => p.v)), max = Math.max(...series.map((p) => p.v));
    if (max - min < 1e-9) { const c = Math.abs(min) || 1; min -= c * 0.02; max += c * 0.02; }
    const n = series.length;
    const x = (i) => pad + (i * (W - 2 * pad)) / Math.max(1, n - 1);
    const y = (v) => H - pad - (v - min) / (max - min) * (H - 2 * pad);
    let line = ""; series.forEach((p, i) => { line += (i === 0 ? "M" : "L") + x(i).toFixed(2) + " " + y(p.v).toFixed(2) + " "; });
    const area = line + "L" + x(n - 1).toFixed(2) + " " + (H - pad) + " L" + x(0).toFixed(2) + " " + (H - pad) + " Z";
    const gid = "grad-" + svgId;
    svg.innerHTML =
      '<defs><linearGradient id="' + gid + '" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="' + color + '" stop-opacity="0.30"/><stop offset="100%" stop-color="' + color + '" stop-opacity="0"/></linearGradient></defs>' +
      '<path d="' + area + '" fill="url(#' + gid + ')"/>' +
      '<path d="' + line + '" fill="none" stroke="' + color + '" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
      '<circle cx="' + x(n - 1).toFixed(2) + '" cy="' + y(series[n - 1].v).toFixed(2) + '" r="3.5" fill="' + color + '"/>' +
      '<line class="hl" x1="0" y1="' + pad + '" x2="0" y2="' + (H - pad) + '" stroke="' + color + '" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>' +
      '<circle class="hd" r="4" fill="' + color + '" opacity="0"/>';
    return { svg, series, W, H, pad, n, x, y, fmt };
  }

  function wireHover(chart) {
    if (!chart) return;
    const svg = chart.svg, tip = $("tip"), card = document.querySelector(".card");
    const move = (clientX) => {
      const { series, W, pad, n, x, y, H, fmt } = chart;
      const rect = svg.getBoundingClientRect();
      const frac = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
      const step = (W - 2 * pad) / Math.max(1, n - 1);
      let idx = Math.round((frac * W - pad) / step); idx = Math.min(n - 1, Math.max(0, idx));
      const p = series[idx], px = x(idx), py = y(p.v);
      const hl = svg.querySelector(".hl"), hd = svg.querySelector(".hd");
      hl.setAttribute("x1", px); hl.setAttribute("x2", px); hl.setAttribute("opacity", "0.5");
      hd.setAttribute("cx", px); hd.setAttribute("cy", py); hd.setAttribute("opacity", "1");
      const cardRect = card.getBoundingClientRect();
      tip.innerHTML = '<div class="tv">' + fmt(p.v) + '</div><div class="td">' + p.t + '</div>';
      tip.style.opacity = "1";
      const half = tip.offsetWidth / 2;
      let lx = rect.left - cardRect.left + (px / W) * rect.width;
      lx = Math.min(cardRect.width - half - 6, Math.max(half + 6, lx));
      tip.style.left = lx + "px";
      tip.style.top = (rect.top - cardRect.top + (py / H) * rect.height - 6) + "px";
    };
    const hide = () => { const hl = svg.querySelector(".hl"), hd = svg.querySelector(".hd"); if (hl) hl.setAttribute("opacity", "0"); if (hd) hd.setAttribute("opacity", "0"); tip.style.opacity = "0"; };
    svg.addEventListener("mousemove", (e) => move(e.clientX));
    svg.addEventListener("mouseleave", hide);
    svg.addEventListener("touchstart", (e) => move(e.touches[0].clientX), { passive: true });
    svg.addEventListener("touchmove", (e) => move(e.touches[0].clientX), { passive: true });
    svg.addEventListener("touchend", hide);
  }

  async function load() {
    try {
      const [book, st] = await Promise.all([
        fetch(BASE + "/book-nav/history.json", { cache: "no-store" }).then((r) => r.json()),
        fetch(BASE + "/strwt/history.json", { cache: "no-store" }).then((r) => r.json()),
      ]);
      const supplyByDate = {};
      (book.points || []).forEach((p) => { if (typeof p.supply === "number") supplyByDate[p.t] = p.supply; });

      const supplySeries = [], pctSeries = [];
      (st.points || []).forEach((p) => {
        if (!p.t) return;
        const stSupply = typeof p.supply === "number"
          ? p.supply
          : (typeof p.staked === "number" && p.rate ? Math.round(p.staked / p.rate) : null);
        if (typeof stSupply === "number") supplySeries.push({ t: p.t, v: stSupply });
        const rwtSup = supplyByDate[p.t];
        if (typeof p.staked === "number" && typeof rwtSup === "number" && rwtSup > 0) {
          pctSeries.push({ t: p.t, v: 100 * p.staked / rwtSup });
        }
      });

      const cAbs = spark("sp-abs", supplySeries, ABS_C, (v) => grp(v) + " stRWT");
      const cPct = spark("sp-pct", pctSeries, PCT_C, (v) => pctTxt(v) + " of RWT");
      wireHover(cAbs); wireHover(cPct);

      $("absv").classList.remove("skel"); $("pctv").classList.remove("skel");
      const la = supplySeries[supplySeries.length - 1], lp = pctSeries[pctSeries.length - 1];
      $("absv").innerHTML = la ? grp(la.v) + '<small>stRWT</small>' : "—";
      $("pctv").textContent = lp ? pctTxt(lp.v) : "—";

      const dates = Array.from(new Set(supplySeries.concat(pctSeries).map((p) => p.t))).sort();
      $("r0").textContent = dates[0] || "—"; $("r1").textContent = dates[dates.length - 1] || "—";
      $("status").textContent = dates.length ? "Last snapshot " + dates[dates.length - 1] : "Collecting snapshots…";
      $("status").classList.remove("err");
    } catch (e) {
      $("status").textContent = "Couldn’t load snapshots, retrying…";
      $("status").classList.add("err");
    }
  }

  load();
  setInterval(load, 300000);

  // Measure content height from body's children (body does not stretch to the iframe
  // viewport, so observing it never feeds back into our own height changes).
  var wfLast = 0;
  function wfMeasure(){
    var kids = document.body.children, max = 0;
    for (var i = 0; i < kids.length; i++) {
      var b = kids[i].getBoundingClientRect().bottom;
      if (b > max) max = b;
    }
    if (!max) max = document.body.scrollHeight;
    return Math.ceil(max) + 1;
  }
  function wfPostHeight(){
    var h = wfMeasure();
    if (h === wfLast) return;
    wfLast = h;
    try { parent.postMessage({ type: "wf-height", height: h }, "*"); } catch (e) {}
  }
  window.addEventListener("load", wfPostHeight);
  if (document.fonts && document.fonts.ready) { document.fonts.ready.then(wfPostHeight); }
  if (window.ResizeObserver) { new ResizeObserver(wfPostHeight).observe(document.body); }
  [50, 200, 500, 1000, 2000, 3500].forEach(function (t) { setTimeout(wfPostHeight, t); });
</script>
</body>
</html>
