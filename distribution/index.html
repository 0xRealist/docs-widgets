<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Income Distribution</title>
<style>
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Rg.ttf") format("truetype"); font-weight: 400; font-display: swap; }
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Bd.ttf") format("truetype"); font-weight: 700; font-display: swap; }
  :root {
    --fg: #11151c; --muted: rgba(17,21,28,0.55);
    --panel: rgba(138,160,200,0.07); --panel2: rgba(138,160,200,0.10);
    --border: rgba(138,160,200,0.22); --accent: #5b6f94; --good: #2fae74; --err: #c0392b;
    --track: rgba(138,160,200,0.16);
  }
  
    :root {
      --fg: #e9eef6; --muted: rgba(233,238,246,0.55);
      --panel: rgba(138,160,200,0.06); --panel2: rgba(138,160,200,0.10);
      --border: rgba(138,160,200,0.18); --accent: #aebfdb; --good: #41c98a; --err: #e06b6b;
      --track: rgba(138,160,200,0.14);
    }
  
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #0b0c0e; }
  body { font-family: "Halvar Breit", Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; color: var(--fg); -webkit-font-smoothing: antialiased; }
  .card { border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.4rem 1.1rem; background: var(--panel); }
  .hd { display: flex; align-items: center; gap: 10px; margin-bottom: 0.9rem; }
  .alogo { width: 26px; height: auto; flex: 0 0 auto; }
  .areal-dark { display: none; } .areal-light { display: inline; }
   .areal-dark { display: inline; } .areal-light { display: none; } 
  .hd-title { font-size: 11px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); }
  .live { margin-left: auto; display: inline-flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); display: inline-block; box-shadow: 0 0 0 0 rgba(65,201,138,0.55); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(65,201,138,0.5);} 70% { box-shadow: 0 0 0 6px rgba(65,201,138,0);} 100% { box-shadow: 0 0 0 0 rgba(65,201,138,0);} }
  .sub { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; }
  .total { font-size: 34px; font-weight: 750; line-height: 1.05; letter-spacing: -0.02em; margin-top: 2px; }
  .dbar { display: flex; height: 10px; border-radius: 999px; overflow: hidden; margin: 1rem 0 1.1rem; background: var(--track); gap: 2px; }
  .dbar > span { height: 100%; }
  .rows { display: flex; flex-direction: column; gap: 0.55rem; }
  .drow { display: flex; align-items: center; gap: 9px; font-size: 13px; }
  .dc { width: 10px; height: 10px; border-radius: 3px; flex: 0 0 auto; }
  .drow .pc { font-weight: 700; width: 34px; }
  .drow .dl { flex: 1; color: var(--fg); }
  .drow .da { font-weight: 700; color: var(--fg); }
  .foot { margin-top: 1rem; font-size: 10.5px; color: var(--muted); display: flex; justify-content: space-between; gap: 1rem; }
  .err { color: var(--err); } .skel { color: var(--muted); }
  @media (max-width: 480px) {
    .card { padding: 1rem 1rem 0.9rem; border-radius: 14px; }
    .total { font-size: 28px; } .drow { font-size: 12px; }
    .foot { font-size: 9.5px; flex-direction: column; gap: 0.3rem; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="hd">
      <img class="alogo areal-light" src="./areal-dark.svg" alt="Areal" />
      <img class="alogo areal-dark" src="./areal-white.svg" alt="Areal" />
      <span class="hd-title">Income Distribution</span>
      <span class="live"><span class="dot"></span> live</span>
    </div>
    <div class="sub">Total distributed</div>
    <div id="total" class="total skel">$—</div>

    <div class="dbar">
      <span style="width:40%;background:#8aa0c8"></span>
      <span style="width:30%;background:#e3c27a"></span>
      <span style="width:20%;background:#5fbf9b"></span>
      <span style="width:10%;background:#aebfdb"></span>
    </div>

    <div class="rows">
      <div class="drow"><span class="dc" style="background:#8aa0c8"></span><span class="pc">40%</span><span class="dl">Compounding</span><span id="d-comp" class="da skel">$—</span></div>
      <div class="drow"><span class="dc" style="background:#e3c27a"></span><span class="pc">30%</span><span class="dl">stRWT staking</span><span id="d-stake" class="da skel">$—</span></div>
      <div class="drow"><span class="dc" style="background:#5fbf9b"></span><span class="pc">20%</span><span class="dl">Liquidity</span><span id="d-liq" class="da skel">$—</span></div>
      <div class="drow"><span class="dc" style="background:#aebfdb"></span><span class="pc">10%</span><span class="dl">Areal Finance DAO</span><span id="d-dao" class="da skel">$—</span></div>
    </div>

    <div class="foot">
      <span id="status">Loading…</span>
      <span>derived from Book NAV growth</span>
    </div>
  </div>

<script>
  const RPCS = ["https://solana-rpc.publicnode.com", "https://api.mainnet-beta.solana.com"];
  let rpcIdx = 0;
  const EARN = "5GyVeryGnTPPtfteYaj5pNUjE9s2DDDpDnccgoFjV8L3"; // EarnConfig PDA
  const RWT = "RWTeFt9M635Tf6w6yveAoXQR2ZwfXs7MfA7W3grDuGT";

  const $ = (id) => document.getElementById(id);
  const fmt = (n) => "$" + (n >= 1000 ? n.toLocaleString("en-US", { maximumFractionDigits: 0 }) : n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }));

  async function rpc(method, params) {
    let lastErr;
    for (let k = 0; k < RPCS.length; k++) {
      const i = (rpcIdx + k) % RPCS.length;
      try {
        const r = await fetch(RPCS[i], { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ jsonrpc: "2.0", id: 1, method, params }) });
        if (!r.ok) throw new Error("HTTP " + r.status);
        const j = await r.json();
        if (j.error) throw new Error(j.error.message || "rpc error");
        rpcIdx = i; return j;
      } catch (e) { lastErr = e; }
    }
    throw lastErr || new Error("all RPCs failed");
  }

  async function load() {
    try {
      const [earn, sup] = await Promise.all([
        rpc("getAccountInfo", [EARN, { encoding: "base64" }]),
        rpc("getTokenSupply", [RWT]),
      ]);
      const bin = atob(earn.result.value.data[0]);
      let capital = 0n;
      for (let i = 0; i < 16; i++) capital += BigInt(bin.charCodeAt(8 + i)) << (8n * BigInt(i));
      const rwtSupply = Number(sup.result.value.amount);
      const nav = rwtSupply === 0 ? 1 : Number(capital) / rwtSupply;
      const supplyHuman = rwtSupply / 1e6;

      const comp = Math.max(0, nav - 1) * supplyHuman; // 40% compounding (NAV growth)
      const total = comp / 0.40;                        // implied 100%
      const stake = total * 0.30;
      const liq = total * 0.20;
      const dao = total * 0.10;

      ["total", "d-comp", "d-stake", "d-liq", "d-dao"].forEach((id) => $(id).classList.remove("skel"));
      $("total").textContent = fmt(total);
      $("d-comp").textContent = fmt(comp);
      $("d-stake").textContent = fmt(stake);
      $("d-liq").textContent = fmt(liq);
      $("d-dao").textContent = fmt(dao);
      $("status").textContent = "Updated " + new Date().toISOString().slice(11, 19) + " UTC · every 30s";
      $("status").classList.remove("err");
    } catch (e) {
      $("status").textContent = "RPC unavailable, retrying…";
      $("status").classList.add("err");
    }
  }

  load();
  setInterval(load, 30000);
</script>
</body>
</html>
