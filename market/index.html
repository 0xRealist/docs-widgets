<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RWT / stRWT Market</title>
<style>
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Rg.ttf") format("truetype"); font-weight: 400; font-display: swap; }
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Bd.ttf") format("truetype"); font-weight: 700; font-display: swap; }
  :root {
    --fg: #11151c; --muted: rgba(17,21,28,0.55);
    --panel: rgba(138,160,200,0.07); --panel2: rgba(138,160,200,0.10);
    --border: rgba(138,160,200,0.22); --accent: #5b6f94; --good: #2fae74; --err: #c0392b;
    --track: rgba(138,160,200,0.18);
  }
  
    :root {
      --fg: #e9eef6; --muted: rgba(233,238,246,0.55);
      --panel: rgba(138,160,200,0.06); --panel2: rgba(138,160,200,0.10);
      --border: rgba(138,160,200,0.18); --accent: #aebfdb; --good: #41c98a; --err: #e06b6b;
      --track: rgba(138,160,200,0.16);
    }
  
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #0b0c0e; }
  body { font-family: "Halvar Breit", Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; color: var(--fg); -webkit-font-smoothing: antialiased; }
  .card { position: relative; border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.4rem 1.1rem; background: var(--panel); }
  .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .id { display: flex; align-items: center; gap: 0.85rem; }
  .logo { width: 56px; height: 56px; border-radius: 50%; flex: 0 0 auto; border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
  .label { font-size: 10.5px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); display: inline-block; box-shadow: 0 0 0 0 rgba(65,201,138,0.55); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(65,201,138,0.5);} 70% { box-shadow: 0 0 0 6px rgba(65,201,138,0);} 100% { box-shadow: 0 0 0 0 rgba(65,201,138,0);} }
  .sub { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; }
  .price { font-size: 32px; font-weight: 750; line-height: 1.05; letter-spacing: -0.02em; }
  .reserves { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .pill { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; background: var(--panel2); color: var(--accent); white-space: nowrap; }
  .util { margin: 1rem 0 0.2rem; }
  .util-head { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .util-head b { color: var(--fg); font-size: 12px; }
  .bar { position: relative; height: 8px; border-radius: 999px; background: var(--track); overflow: hidden; }
  .bar > .target { position: absolute; top: 0; bottom: 0; background: rgba(138,160,200,0.30);
    border-left: 1px dashed rgba(138,160,200,0.6); border-right: 1px dashed rgba(138,160,200,0.6); }
  .bar > i { position: relative; display: block; height: 100%; width: 0; background: linear-gradient(90deg,#8aa0c8,#aebfdb); border-radius: 999px; transition: width .4s; }
  .util-cap { font-size: 10.5px; color: var(--muted); margin-top: 6px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-top: 1rem; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 0.7rem 0.8rem; }
  .stat .k { font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }
  .stat .v { font-size: 16px; font-weight: 650; margin-top: 3px; }
  .stat .s { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .stat .duo { font-size: 14px; font-weight: 600; }
  .stat .k + .duo { margin-top: 3px; }
  .foot { margin-top: 0.85rem; font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; gap: 1rem; }
  .foot a { color: var(--accent); text-decoration: none; }
  .foot a:hover { text-decoration: underline; }
  .err { color: var(--err); } .skel { color: var(--muted); }
  @media (max-width: 480px) {
    .card { padding: 1rem 1.05rem 0.95rem; border-radius: 14px; }
    .price { font-size: 27px; } .logo { width: 46px; height: 46px; } .id { gap: 0.7rem; }
    .label { font-size: 10px; } .pill { font-size: 10px; padding: 3px 8px; }
    .reserves { font-size: 12px; }
    .util-cap { font-size: 10px; }
    .stats { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .stat { padding: 0.65rem 0.75rem; border-radius: 11px; }
    .stat:last-child { grid-column: 1 / -1; }
    .stat .k { font-size: 9.5px; } .stat .v { font-size: 15px; } .stat .s { font-size: 11px; } .stat .duo { font-size: 13.5px; }
    .foot { font-size: 10px; flex-direction: column; gap: 0.35rem; }
  }
  @media (max-width: 340px) { .stats { grid-template-columns: 1fr; } .stat:last-child { grid-column: auto; } }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="id">
        <img class="logo" src="./pair.png" alt="RWT/stRWT" width="56" height="56" />
        <div>
          <div class="label"><span class="dot"></span> RWT / stRWT Market</div>
          <div class="sub">Total liquidity</div>
          <div id="tvl" class="price skel">$—</div>
          <div id="reserves" class="reserves skel">—</div>
        </div>
      </div>
      <div id="pill" class="pill">0.25% fee</div>
    </div>

    <div class="util">
      <div class="util-head"><span>Utilization (borrowed)</span><b id="utilpct">—</b></div>
      <div class="bar"><span id="utiltarget" class="target"></span><i id="utilbar"></i></div>
      <div id="utilcap" class="util-cap skel">—</div>
    </div>

    <div class="stats">
      <div class="stat"><div class="k">Collateral</div><div id="coll0" class="duo skel">—</div><div id="coll1" class="duo"></div></div>
      <div class="stat"><div class="k">Borrowed</div><div id="debt0" class="duo skel">—</div><div id="debt1" class="duo"></div></div>
      <div class="stat"><div class="k">Pool price</div><div id="poolprice" class="v skel">—</div><div class="s">RWT per stRWT</div></div>
    </div>

    <div class="foot">
      <span id="status">Loading…</span>
      <a href="https://www.omnipair.fi/market/EYpKtcY5xkA8aQQTKYyEpFdRua5GM47YVWVfG9scn4Hd" target="_blank" rel="noreferrer">open on Omnipair ↗</a>
    </div>
  </div>

<script>
  const RPCS = ["https://solana-rpc.publicnode.com", "https://api.mainnet-beta.solana.com"];
  let rpcIdx = 0;
  const MARKET = "EYpKtcY5xkA8aQQTKYyEpFdRua5GM47YVWVfG9scn4Hd"; // Omnipair Pair (RWT/stRWT)
  const RATE_MODEL = "DYsfQ9z1wCLnpMMuhZ4TANLNwnjo73SzDTyxkM7DZmdo"; // interest-rate model (target utilization)
  const RWT = "RWTeFt9M635Tf6w6yveAoXQR2ZwfXs7MfA7W3grDuGT";
  const EARN = "5GyVeryGnTPPtfteYaj5pNUjE9s2DDDpDnccgoFjV8L3"; // EarnConfig PDA (Book NAV)

  const $ = (id) => document.getElementById(id);
  const fmt = (n, d) => n.toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d });
  const grp = (n) => n.toLocaleString("en-US", { maximumFractionDigits: 2 });

  async function rpc(method, params) {
    let lastErr;
    for (let k = 0; k < RPCS.length; k++) {
      const i = (rpcIdx + k) % RPCS.length;
      try {
        const r = await fetch(RPCS[i], { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ jsonrpc: "2.0", id: 1, method, params }) });
        if (!r.ok) throw new Error("HTTP " + r.status);
        const j = await r.json();
        if (j.error) throw new Error(j.error.message || "rpc error");
        rpcIdx = i; return j;
      } catch (e) { lastErr = e; }
    }
    throw lastErr || new Error("all RPCs failed");
  }

  const u64 = (b, o) => { let v = 0; for (let i = 0; i < 8; i++) v += b.charCodeAt(o + i) * Math.pow(2, 8 * i); return v; };
  const u16 = (b, o) => b.charCodeAt(o) + b.charCodeAt(o + 1) * 256;

  async function load() {
    try {
      const [mk, rate, earn, rwtSup] = await Promise.all([
        rpc("getAccountInfo", [MARKET, { encoding: "base64" }]),
        rpc("getAccountInfo", [RATE_MODEL, { encoding: "base64" }]),
        rpc("getAccountInfo", [EARN, { encoding: "base64" }]),
        rpc("getTokenSupply", [RWT]),
      ]);
      const b = atob(mk.result.value.data[0]);
      const ox = b.charCodeAt(146) ? 2 : 0; // Option<u16> fixed_cf_bps tag
      const swapBps = u16(b, 136);
      const halfLifeMs = u64(b, 138);       // EMA price half-life (ms)
      const reserve0 = u64(b, 147 + ox), reserve1 = u64(b, 155 + ox);
      const cash0 = u64(b, 163 + ox), cash1 = u64(b, 171 + ox);
      const price1 = u64(b, 195 + ox); // last_price1_ema.symmetric (stRWT in RWT, 1e9)
      const debt0 = u64(b, 235 + ox), debt1 = u64(b, 243 + ox);
      const coll0 = u64(b, 291 + ox), coll1 = u64(b, 299 + ox);

      // RateModel: target utilization band (1e9 scale)
      const rb = atob(rate.result.value.data[0]);
      const tStart = u64(rb, 16) / 1e7; // -> percent
      const tEnd = u64(rb, 24) / 1e7;   // -> percent
      const emaMin = Math.round(halfLifeMs / 60000);

      // Book NAV (RWT USD)
      const eb = atob(earn.result.value.data[0]);
      let cap = 0n; for (let i = 0; i < 16; i++) cap += BigInt(eb.charCodeAt(8 + i)) << (8n * BigInt(i));
      const rwtSupply = Number(rwtSup.result.value.amount);
      const navRWT = rwtSupply === 0 ? 1 : Number(cap) / rwtSupply; // USD per RWT
      const poolPrice = price1 / 1e9;                               // RWT per stRWT
      const navStRWT = poolPrice * navRWT;                          // USD per stRWT

      const r0 = reserve0 / 1e6, r1 = reserve1 / 1e6;
      const tvl = r0 * navRWT + r1 * navStRWT;
      // utilization = borrowed value / (borrowed + available cash) value
      const borrowVal = (debt0 / 1e6) * navRWT + (debt1 / 1e6) * navStRWT;
      const cashVal = (cash0 / 1e6) * navRWT + (cash1 / 1e6) * navStRWT;
      const util = borrowVal + cashVal > 0 ? (100 * borrowVal / (borrowVal + cashVal)) : 0;

      $("tvl").classList.remove("skel"); $("reserves").classList.remove("skel");
      $("coll0").classList.remove("skel"); $("debt0").classList.remove("skel"); $("poolprice").classList.remove("skel");
      $("tvl").textContent = "$" + grp(tvl);
      $("reserves").textContent = grp(r0) + " RWT · " + grp(r1) + " stRWT";
      $("pill").textContent = (swapBps / 100) + "% fee";
      $("utilpct").textContent = util.toFixed(2) + "%";
      $("utilbar").style.width = Math.min(100, util) + "%";
      const tgt = $("utiltarget");
      tgt.style.left = tStart + "%";
      tgt.style.width = (tEnd - tStart) + "%";
      $("utilcap").classList.remove("skel");
      $("utilcap").textContent = "Target " + grp(tStart) + "–" + grp(tEnd) + "% · EMA half-life " + emaMin + "m";
      $("coll0").textContent = grp(coll0 / 1e6) + " RWT";
      $("coll1").textContent = grp(coll1 / 1e6) + " stRWT";
      $("debt0").textContent = grp(debt0 / 1e6) + " RWT";
      $("debt1").textContent = grp(debt1 / 1e6) + " stRWT";
      $("poolprice").textContent = fmt(poolPrice, 4);
      $("status").textContent = "Updated " + new Date().toISOString().slice(11, 19) + " UTC · every 30s";
      $("status").classList.remove("err");
    } catch (e) {
      $("status").textContent = "RPC unavailable, retrying…";
      $("status").classList.add("err");
    }
  }

  load();
  setInterval(load, 30000);

  // Measure content height from body's children (body does not stretch to the iframe
  // viewport, so observing it never feeds back into our own height changes).
  var wfLast = 0;
  function wfMeasure(){
    var kids = document.body.children, max = 0;
    for (var i = 0; i < kids.length; i++) {
      var b = kids[i].getBoundingClientRect().bottom;
      if (b > max) max = b;
    }
    if (!max) max = document.body.scrollHeight;
    return Math.ceil(max) + 1;
  }
  function wfPostHeight(){
    var h = wfMeasure();
    if (h === wfLast) return;
    wfLast = h;
    try { parent.postMessage({ type: "wf-height", height: h }, "*"); } catch (e) {}
  }
  window.addEventListener("load", wfPostHeight);
  if (document.fonts && document.fonts.ready) { document.fonts.ready.then(wfPostHeight); }
  if (window.ResizeObserver) { new ResizeObserver(wfPostHeight).observe(document.body); }
  [50, 200, 500, 1000, 2000, 3500].forEach(function (t) { setTimeout(wfPostHeight, t); });
</script>
</body>
</html>
