<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RWT Liquidity</title>
<style>
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Rg.ttf") format("truetype"); font-weight: 400; font-display: swap; }
  @font-face { font-family: "Halvar Breit"; src: url("../fonts/HalvarBreit-Bd.ttf") format("truetype"); font-weight: 700; font-display: swap; }
  :root {
    --fg: #e9eef6; --muted: rgba(233,238,246,0.55);
    --panel: rgba(138,160,200,0.06); --panel2: rgba(138,160,200,0.10);
    --border: rgba(138,160,200,0.18); --accent: #aebfdb; --good: #41c98a; --err: #e06b6b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #0b0c0e; }
  body { font-family: "Halvar Breit", Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; color: var(--fg); -webkit-font-smoothing: antialiased; }
  .card { border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.4rem 1.1rem; background: var(--panel); }
  .hd { display: flex; align-items: center; gap: 8px; margin-bottom: 0.8rem; }
  .hd-title { font-size: 11px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); }
  .live { margin-left: auto; display: inline-flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); display: inline-block; box-shadow: 0 0 0 0 rgba(65,201,138,0.55); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(65,201,138,0.5);} 70% { box-shadow: 0 0 0 6px rgba(65,201,138,0);} 100% { box-shadow: 0 0 0 0 rgba(65,201,138,0);} }
  .sub { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; }
  .tvl { font-size: 34px; font-weight: 750; line-height: 1.05; letter-spacing: -0.02em; margin-top: 2px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin: 1rem 0 1.1rem; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 0.65rem 0.8rem; }
  .stat .k { font-size: 9.5px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }
  .stat .v { font-size: 16px; font-weight: 700; margin-top: 3px; }
  .pools-h { font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
  .pool { display: flex; align-items: center; gap: 0.7rem; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 0.6rem 0.8rem; margin-bottom: 0.5rem; }
  .pool img { width: 26px; height: 26px; border-radius: 50%; flex: 0 0 auto; }
  .pool .pn { font-size: 13px; font-weight: 700; }
  .pool .pm { font-size: 10.5px; color: var(--muted); margin-top: 1px; }
  .pool .pr { margin-left: auto; text-align: right; }
  .pool .pv { font-size: 14px; font-weight: 700; }
  .pool .pl { font-size: 10.5px; color: var(--accent); text-decoration: none; }
  .pool .pl:hover { text-decoration: underline; }
  .foot { margin-top: 0.85rem; font-size: 10.5px; color: var(--muted); display: flex; justify-content: space-between; gap: 1rem; }
  .err { color: var(--err); } .skel { color: var(--muted); }
  @media (max-width: 480px) {
    .card { padding: 1rem 1.05rem 0.95rem; border-radius: 14px; }
    .tvl { font-size: 28px; }
    .stats { grid-template-columns: 1fr; gap: 0.5rem; margin: 0.9rem 0 1rem; }
    .stat { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 0.7rem 0.95rem; border-radius: 11px; }
    .stat .k { font-size: 10.5px; } .stat .v { font-size: 15px; margin-top: 0; text-align: right; }
    .pool { padding: 0.65rem 0.8rem; }
    .pool .pn { font-size: 12.5px; } .pool .pv { font-size: 13.5px; }
    .foot { font-size: 9.5px; flex-direction: column; gap: 0.3rem; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="hd">
      <span class="hd-title">RWT Liquidity</span>
      <span class="live"><span class="dot"></span> live</span>
    </div>
    <div class="sub">Total liquidity (TVL)</div>
    <div id="tvl" class="tvl skel">$—</div>

    <div class="stats">
      <div class="stat"><div class="k">RWT in pools</div><div id="rwt" class="v skel">—</div></div>
      <div class="stat"><div class="k">USDC in pools</div><div id="usdc" class="v skel">—</div></div>
      <div class="stat"><div class="k">RWT price (DEX)</div><div id="px" class="v skel">—</div></div>
    </div>

    <div class="pools-h">Liquidity pools</div>
    <div id="pools"><div class="sub skel">Loading pools…</div></div>

    <div class="foot">
      <span id="status">Loading…</span>
      <span>on-chain · valued at pool price</span>
    </div>
  </div>

<script>
  const RPCS = ["https://solana-rpc.publicnode.com", "https://api.mainnet-beta.solana.com"];
  let rpcIdx = 0;
  const RWT = "RWTeFt9M635Tf6w6yveAoXQR2ZwfXs7MfA7W3grDuGT";
  const STRWT = "sRWTy1bkqvRegb31RETanhbAtJ7eXN6XsTvaqBRh6kA";
  const EARN = "5GyVeryGnTPPtfteYaj5pNUjE9s2DDDpDnccgoFjV8L3"; // EarnConfig PDA (Book NAV)
  const STAKE_CFG = "EwXST2yoQRBf3FEYe6fyoseatHaVypYck3ZQ5bEGzEUe"; // StakingConfig PDA (rate counters)
  const STAKE_ACTIVE_OFFSET = 201; // total_rwt_active (u64 LE) — rate numerator, not vault balance
  const STABLES = {
    "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v": "USDC",
    "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB": "USDT"
  };
  const SYMBOLS = Object.assign({ [RWT]: "RWT", [STRWT]: "stRWT" }, STABLES);

  const $ = (id) => document.getElementById(id);
  const fmt = (n, d) => n.toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d });
  const grp = (n) => n.toLocaleString("en-US", { maximumFractionDigits: 2 });
  const usd = (n) => "$" + (n >= 1000 ? n.toLocaleString("en-US", { maximumFractionDigits: 0 }) : fmt(n, 2));
  const dexLogo = (id) => "https://dd.dexscreener.com/ds-data/dexes/" + (id || "").toLowerCase() + ".png";

  async function rpc(method, params) {
    let lastErr;
    for (let k = 0; k < RPCS.length; k++) {
      const i = (rpcIdx + k) % RPCS.length;
      try {
        const r = await fetch(RPCS[i], { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ jsonrpc: "2.0", id: 1, method, params }) });
        if (!r.ok) throw new Error("HTTP " + r.status);
        const j = await r.json();
        if (j.error) throw new Error(j.error.message || "rpc error");
        rpcIdx = i; return j;
      } catch (e) { lastErr = e; }
    }
    throw lastErr || new Error("all RPCs failed");
  }

  // base58 encode a 32-byte pubkey
  const B58 = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
  function b58(bytes) {
    let zeros = 0; while (zeros < bytes.length && bytes[zeros] === 0) zeros++;
    const digits = [0];
    for (let i = zeros; i < bytes.length; i++) {
      let carry = bytes[i];
      for (let j = 0; j < digits.length; j++) { carry += digits[j] << 8; digits[j] = carry % 58; carry = (carry / 58) | 0; }
      while (carry > 0) { digits.push(carry % 58); carry = (carry / 58) | 0; }
    }
    let out = ""; for (let i = 0; i < zeros; i++) out += "1";
    for (let i = digits.length - 1; i >= 0; i--) out += B58[digits[i]];
    return out;
  }
  function pubkeyAt(bin, off) {
    const b = new Uint8Array(32);
    for (let i = 0; i < 32; i++) b[i] = bin.charCodeAt(off + i);
    return b58(b);
  }
  function i32At(bin, off) {
    let v = 0; for (let i = 0; i < 4; i++) v += bin.charCodeAt(off + i) << (8 * i);
    return v | 0; // signed
  }
  function u16At(bin, off) { return bin.charCodeAt(off) + bin.charCodeAt(off + 1) * 256; }

  // Parse a Meteora DLMM LbPair account (offsets verified on-chain)
  function parseDlmm(bin) {
    return {
      tokenX: pubkeyAt(bin, 88), tokenY: pubkeyAt(bin, 120),
      reserveX: pubkeyAt(bin, 152), reserveY: pubkeyAt(bin, 184),
      activeId: i32At(bin, 76), binStep: u16At(bin, 80),
    };
  }

  async function bookNav() {
    const [earn, sup] = await Promise.all([
      rpc("getAccountInfo", [EARN, { encoding: "base64" }]),
      rpc("getTokenSupply", [RWT]),
    ]);
    const bin = atob(earn.result.value.data[0]);
    let capital = 0n; for (let i = 0; i < 16; i++) capital += BigInt(bin.charCodeAt(8 + i)) << (8n * BigInt(i));
    const supply = Number(sup.result.value.amount);
    return supply === 0 ? 1 : Number(capital) / supply; // USD per RWT
  }

  let _navStRWT = null;
  async function navStRWTusd(navRWT) {
    if (_navStRWT != null) return _navStRWT;
    const [cfg, sup] = await Promise.all([
      rpc("getAccountInfo", [STAKE_CFG, { encoding: "base64" }]),
      rpc("getTokenSupply", [STRWT]),
    ]);
    const cfgBin = atob(cfg.result.value.data[0]);
    let active = 0n; // total_rwt_active (u64 LE) — excludes cooldown reserve
    for (let i = 0; i < 8; i++) active += BigInt(cfgBin.charCodeAt(STAKE_ACTIVE_OFFSET + i)) << (8n * BigInt(i));
    const stSupply = Number(sup.result.value.amount);
    const rate = (Number(active) + 1e7) / (stSupply + 1e6);
    _navStRWT = rate * navRWT;
    return _navStRWT;
  }

  async function readPool(p, navRWT) {
    const acc = await rpc("getAccountInfo", [p.address, { encoding: "base64" }]);
    if (!acc.result.value) throw new Error("pool not found");
    const d = parseDlmm(atob(acc.result.value.data[0]));
    const [bx, by] = await Promise.all([
      rpc("getTokenAccountBalance", [d.reserveX]),
      rpc("getTokenAccountBalance", [d.reserveY]),
    ]);
    const ax = Number(bx.result.value.uiAmount || 0), decX = bx.result.value.decimals;
    const ay = Number(by.result.value.uiAmount || 0), decY = by.result.value.decimals;
    // DLMM spot price of X in Y, scaled by decimals
    const spotXinY = Math.pow(1 + d.binStep / 10000, d.activeId) * Math.pow(10, decX - decY);
    // RWT market price (USD) from this pool when paired with a stablecoin; else fall back to Book NAV
    let rwtPrice = null;
    if (d.tokenX === RWT && STABLES[d.tokenY]) rwtPrice = spotXinY;
    else if (d.tokenY === RWT && STABLES[d.tokenX]) rwtPrice = spotXinY ? 1 / spotXinY : null;
    const rwtUsd = rwtPrice != null ? rwtPrice : navRWT;
    // Value each side at the current market price (RWT at the pool spot, stables $1, stRWT at rate x NAV)
    const priceOf = async (mint) => {
      if (mint === RWT) return rwtUsd;
      if (STABLES[mint]) return 1;
      if (mint === STRWT) return await navStRWTusd(navRWT);
      return null;
    };
    const [px, py] = await Promise.all([priceOf(d.tokenX), priceOf(d.tokenY)]);
    const usdX = px == null ? 0 : ax * px, usdY = py == null ? 0 : ay * py;
    return {
      ...p, tvl: usdX + usdY,
      rwt: (d.tokenX === RWT ? ax : 0) + (d.tokenY === RWT ? ay : 0),
      usdc: (STABLES[d.tokenX] ? ax : 0) + (STABLES[d.tokenY] ? ay : 0),
      pair: (SYMBOLS[d.tokenX] || "?") + " / " + (SYMBOLS[d.tokenY] || "?"),
      rwtPrice,
    };
  }

  async function load() {
    try {
      const reg = await fetch("./pools.json", { cache: "no-store" }).then((r) => r.json());
      const list = (reg.pools || []).filter((p) => p.type === "meteora-dlmm");
      const navRWT = await bookNav();

      const results = [];
      for (const p of list) { try { results.push(await readPool(p, navRWT)); } catch (e) { /* skip bad pool */ } }
      results.sort((a, b) => b.tvl - a.tvl);

      const tvl = results.reduce((s, r) => s + r.tvl, 0);
      const rwt = results.reduce((s, r) => s + r.rwt, 0);
      const usdc = results.reduce((s, r) => s + r.usdc, 0);
      const px = (results.find((r) => r.rwtPrice != null) || {}).rwtPrice;

      ["tvl", "rwt", "usdc", "px"].forEach((id) => $(id).classList.remove("skel"));
      $("tvl").textContent = usd(tvl);
      $("rwt").textContent = grp(rwt) + " RWT";
      $("usdc").textContent = grp(usdc) + " USDC";
      $("px").textContent = px != null ? "$" + fmt(px, 4) : "$" + fmt(navRWT, 4);

      $("pools").innerHTML = results.map((r) =>
        '<div class="pool">' +
        '<img src="' + dexLogo(r.dex) + '" alt="" onerror="this.style.display=\'none\'" />' +
        '<div><div class="pn">' + r.dex + (r.label ? " " + r.label : "") + '</div><div class="pm">' + r.pair + '</div></div>' +
        '<div class="pr"><div class="pv">' + usd(r.tvl) + '</div>' +
        '<a class="pl" href="' + (r.url || "#") + '" target="_blank" rel="noreferrer">open ↗</a></div>' +
        '</div>'
      ).join("") || '<div class="sub">No pools configured.</div>';

      $("status").textContent = "Updated " + new Date().toISOString().slice(11, 19) + " UTC · every 60s";
      $("status").classList.remove("err");
    } catch (e) {
      $("status").textContent = "RPC unavailable, retrying…";
      $("status").classList.add("err");
    }
  }

  load();
  setInterval(() => { _navStRWT = null; load(); }, 60000);

  // Measure content height from body's children (body does not stretch to the iframe
  // viewport, so observing it never feeds back into our own height changes).
  var wfLast = 0;
  function wfMeasure(){
    var kids = document.body.children, max = 0;
    for (var i = 0; i < kids.length; i++) {
      var b = kids[i].getBoundingClientRect().bottom;
      if (b > max) max = b;
    }
    if (!max) max = document.body.scrollHeight;
    return Math.ceil(max) + 1;
  }
  function wfPostHeight(){
    var h = wfMeasure();
    if (h === wfLast) return;
    wfLast = h;
    try { parent.postMessage({ type: "wf-height", height: h }, "*"); } catch (e) {}
  }
  window.addEventListener("load", wfPostHeight);
  if (document.fonts && document.fonts.ready) { document.fonts.ready.then(wfPostHeight); }
  if (window.ResizeObserver) { new ResizeObserver(wfPostHeight).observe(document.body); }
  [50, 200, 500, 1000, 2000, 3500].forEach(function (t) { setTimeout(wfPostHeight, t); });
</script>
</body>
</html>
